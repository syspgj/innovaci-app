}

async function loadDirectorData(){
  const {data:kc}=await sb.from('kpi_config').select('*').eq('anio',currentYear).eq('mes',currentMonth).eq('activo',true).order('orden');
  kpiConfig=(kc&&kc.length>0)?kc:getDefaultKpiConfig(currentYear,currentMonth);
  const desde=`${currentYear}-${String(currentMonth).padStart(2,'0')}-01`;
  const lastDay=new Date(currentYear,currentMonth,0).getDate();
  const hasta=`${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`;
  const {data:regs}=await sb.from('registros_diarios').select('*').gte('fecha',desde).lte('fecha',hasta).order('fecha');
  allRegistros=regs||[];
  const {data:users}=await sb.from('usuarios').select('*').eq('activo',true).neq('rol','director').order('nombre');
  return users||[];
}

function getTotals(regs,userId){
  const tot={svc:0,aspel:0,it:0,cursos:0,sf:0,demos:0,val:0,cn:0,dip:0,sus:0,cur_vivo:0,
    llamadas:0,prospectos:0,confirmaciones:0,seguimientos:0,crm:0,cur_tele:0,siigo_tele:0,renovaciones_tele:0};
  const myRegs=userId?regs.filter(r=>r.usuario_id===userId):regs;
  for(const r of myRegs){
    tot.svc+=r.svc||0; tot.aspel+=r.aspel||0; tot.it+=r.it||0;
    tot.cursos+=r.cursos||0; tot.sf+=r.siigo_fiscal||0; tot.demos+=r.demos||0;
    tot.val+=r.valoraciones||0; tot.cn+=r.clientes_nuevos||0; tot.dip+=r.diplomados||0;
    tot.sus+=r.suscripciones||0; tot.cur_vivo+=r.talleres_vivo||0;
    tot.llamadas+=r.llamadas_efectivas||0; tot.prospectos+=r.prospectos_canalizados||0;
    tot.confirmaciones+=r.confirmaciones_evento||0; tot.seguimientos+=r.seguimientos_post||0;
    tot.crm+=r.crm_actualizaciones||0; tot.cur_tele+=r.venta_cursos_tele||0;
    tot.siigo_tele+=r.siigo_activaciones||0; tot.renovaciones_tele+=r.renovaciones||0;
  }
  return tot;
}

async function renderDirectorResumen(){
  const mc=document.getElementById('mainContent');
  mc.innerHTML='<div class="loading"><div class="spinner"></div> Cargando datos del equipo...</div>';
  const users=await loadDirectorData();
  if(!users.length){mc.innerHTML='<div class="loading">No hay vendedores registrados aún.</div>';return;}
  const mo=MO[currentMonth]||{dias:22,trans:10,cerrado:false};
  const vendedoresRes=users.filter(u=>u.rol==='vendedor');
  // Set global dept status PRIMERO — getRate() depende de deptoAlcanzado, debe calcularse
  // con los datos del mes actual antes de evaluar la comisión de cada vendedor.
  const metaDeptoRow=kpiConfig.find(k=>k.kpi_key==='meta_depto');
  metaDepto=metaDeptoRow?metaDeptoRow.meta_dulce:160000;
  const totalSvcPreliminar=vendedoresRes.reduce((s,u)=>s+getTotals(allRegistros,u.id).svc,0);
  deptoAlcanzado=totalSvcPreliminar>=metaDepto;
  // Cargar ajustes manuales del mes (una sola consulta, no por vendedor)
  const {data:ajustesMes}=await sb.from('ajustes_comision').select('*').eq('anio',currentYear).eq('mes',currentMonth);
  const ajustesPorUsuario={};
  (ajustesMes||[]).forEach(a=>{ajustesPorUsuario[a.usuario_id]=a;});
  const vData=vendedoresRes.map(u=>{
    const tot=getTotals(allRegistros,u.id);
    const svcM=kpiConfig.find(k=>k.kpi_key==='svc');
    const metaKey=u.email.toLowerCase().includes('dulce')?'meta_dulce':'meta_manuel';
    const svcMeta=svcM?svcM[metaKey]:80000;
    const aspelM=kpiConfig.find(k=>k.kpi_key==='aspel');
    const aspelMeta=aspelM?aspelM[metaKey]:45000;
    const r=getRate(tot.svc,svcMeta,u);
    const cAuto=tot.svc*r;
    const ajusteU=ajustesPorUsuario[u.id]||null;
    const ajusteRes=aplicarAjusteComision(cAuto,r,tot.svc,ajusteU);
    return {u,tot,svcMeta,aspelMeta,rate:ajusteRes.tasaFinal,comm:ajusteRes.comisionFinal,tieneAjuste:ajusteRes.tieneAjuste};
  });
  const totalSvc=vData.reduce((s,v)=>s+v.tot.svc,0);
  const totalAspel=vData.reduce((s,v)=>s+v.tot.aspel,0);
  const metaSvc=vData.reduce((s,v)=>s+v.svcMeta,0);
  const metaAspel=vData.reduce((s,v)=>s+v.aspelMeta,0);
  const totalComm=vData.reduce((s,v)=>s+v.comm,0);
  const hoy=new Date();
  const esEsteMes=hoy.getMonth()+1===currentMonth&&hoy.getFullYear()===currentYear;
  const diasHab=getDiasHabiles(currentYear,currentMonth);
  const diasTrans=esEsteMes?getDiasTranscurridos(currentYear,currentMonth):diasHab;
  const diasRest=Math.max(diasHab-diasTrans,0);
  const cerrado=!esEsteMes||diasRest===0;
  // Prospectos canalizados por vendedor este mes — fuente de verdad: estatus + llamada canalizada
  // Se cuenta por la fecha de la llamada 'Canalizado a ventas', no por updated_at
  const {data:llamadasCanaliz}=await sb.from('prospecto_llamadas')
    .select('prospecto_id,resultado,created_at,usuario_id,prospectos!inner(vendedor_asignado,nombre,estatus)')
    .eq('resultado','Canalizado a ventas');
  const canalizadosPorVendedorMes={};
  let canalizadosSinVendedor=0;
  const canalizadosDetalle={}; // {vendedorId: [{nombre, fecha}], '__sin__':[...]}
  (llamadasCanaliz||[]).forEach(l=>{
    if(!l.created_at) return;
    const d=new Date(l.created_at);
    if(d.getMonth()+1!==currentMonth||d.getFullYear()!==currentYear) return;
    const vid=l.prospectos?.vendedor_asignado;
    const nombre=l.prospectos?.nombre||'—';
    const fecha=`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
    if(vid){
      canalizadosPorVendedorMes[vid]=(canalizadosPorVendedorMes[vid]||0)+1;
      if(!canalizadosDetalle[vid]) canalizadosDetalle[vid]=[];
      canalizadosDetalle[vid].push({nombre,fecha});
    } else {
      canalizadosSinVendedor++;
      if(!canalizadosDetalle['__sin__']) canalizadosDetalle['__sin__']=[];
      canalizadosDetalle['__sin__'].push({nombre,fecha});
    }
  });
  window._canalizadosDetalle=canalizadosDetalle;
  // ── MÉTRICAS ANUALES POR VENDEDOR ──────────────────────────
  const desdeAnio=`${currentYear}-01-01`, hastaAnio=`${currentYear}-12-31`;
  const {data:regsAnioDir}=await sb.from('registros_diarios').select('usuario_id,svc,cotizaciones').gte('fecha',desdeAnio).lte('fecha',hastaAnio);
  const metricasAnuales={};
  vendedoresRes.forEach(u=>{
    const regsU=(regsAnioDir||[]).filter(r=>r.usuario_id===u.id);
    const svcTot=regsU.reduce((s,r)=>s+(r.svc||0),0);
    const cotizTot=regsU.reduce((s,r)=>s+(r.cotizaciones||0),0);
    const facturas=regsU.filter(r=>(r.svc||0)>0).length;
    metricasAnuales[u.id]={ticket:cotizTot>0?svcTot/cotizTot:0,conversion:cotizTot>0?facturas/cotizTot:null,cotizTot,svcTot,facturas};
  });
  // ── CAMPAÑAS ACTIVAS ──────────────────────────────────────
  const [{data:campProspectos},{data:campCarteraList}]=await Promise.all([
    sb.from('campanas').select('id,nombre,activa').eq('activa',true).maybeSingle(),
    sb.from('campanas_cartera').select('id,nombre,activa,total_cuentas').eq('activa',true)
  ]);
  let panelCampanias='';
  const bloquesCamp=[];
  if(campProspectos){
    const [{data:llPros},{count:totalP}]=await Promise.all([
      sb.from('prospecto_llamadas').select('prospecto_id,resultado'),
      sb.from('campana_prospectos').select('id',{count:'exact',head:true}).eq('campana_id',campProspectos.id).then(r=>r)
    ]);
    const contactadosP=new Set((llPros||[]).filter(l=>!['No contestó','Buzón'].includes(l.resultado)).map(l=>l.prospecto_id)).size;
    const tP=(await sb.from('campana_prospectos').select('id',{count:'exact',head:true}).eq('campana_id',campProspectos.id)).count||0;
    const pctP=tP>0?Math.round(contactadosP/tP*100):0;
    bloquesCamp.push(`<div style="flex:1;min-width:200px;"><div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;">📣 ${campProspectos.nombre}</div>
      <div style="height:6px;background:var(--border);border-radius:3px;margin:6px 0;overflow:hidden;"><div style="height:100%;width:${pctP}%;background:${pctP>=80?'#27AE60':pctP>=50?'#F5A623':'#E84040'};border-radius:3px;"></div></div>
      <div style="font-size:11px;color:var(--text3);">${contactadosP}/${tP} contactados · <strong style="color:${pctP>=80?'#27AE60':pctP>=50?'#F5A623':'#E84040'};">${pctP}%</strong></div>
    </div>`);
  }
  for(const camp of (campCarteraList||[])){
    const {data:llCart}=await sb.from('llamadas_cartera').select('cliente_id,resultado').eq('campana_id',camp.id);
    const totalC=camp.total_cuentas||0;
    const contactosC=new Set((llCart||[]).filter(l=>!['No contestó','Buzón'].includes(l.resultado)).map(l=>l.cliente_id)).size;
    const pctC=totalC>0?Math.round(contactosC/totalC*100):0;
    const resCont={};(llCart||[]).forEach(l=>{resCont[l.resultado]=(resCont[l.resultado]||0)+1;});
    bloquesCamp.push(`<div style="flex:1;min-width:200px;"><div style="font-size:10px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;">📋 ${camp.nombre}</div>
      <div style="height:6px;background:var(--border);border-radius:3px;margin:6px 0;overflow:hidden;"><div style="height:100%;width:${pctC}%;background:${pctC>=80?'#27AE60':pctC>=50?'#F5A623':'#E84040'};border-radius:3px;"></div></div>
      <div style="font-size:11px;color:var(--text3);">${contactosC}/${totalC} contactados · <strong style="color:${pctC>=80?'#27AE60':pctC>=50?'#F5A623':'#E84040'};">${pctC}%</strong>${pctC>=80?' <span style="color:#27AE60;">✓</span>':''}</div>
      <div style="margin-top:4px;display:flex;gap:4px;flex-wrap:wrap;">${Object.entries(resCont).map(([r,c])=>`<span style="font-size:9px;padding:1px 6px;background:rgba(0,0,0,0.05);border-radius:3px;">${r}: ${c}</span>`).join('')}</div>
    </div>`);
  }
  if(bloquesCamp.length){
    panelCampanias=`<div class="card" style="padding:16px;margin-bottom:16px;">
      <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:12px;">Avance de campañas activas</div>
      <div style="display:flex;gap:20px;flex-wrap:wrap;">${bloquesCamp.join('')}</div>
    </div>`;
  }
  mc.innerHTML=`
  <div class="alert" style="background:${cerrado?'var(--green-bg)':'var(--gold-bg)'};border-color:${cerrado?'rgba(39,174,96,0.25)':'var(--gold-b)'};">
    ${cerrado?`✅ <strong>${getNombreMes(currentMonth)} ${currentYear}</strong> — Mes cerrado · Datos definitivos`:`⚠️ <strong>${getNombreMes(currentMonth)} ${currentYear} en curso</strong> · ${diasTrans} de ${diasHab} días hábiles · ${diasRest} días restantes`}
  </div>
  <div class="goal-strip">
    <div><div class="gs-lbl">Venta total del equipo</div><div class="gs-val">${fmt(totalSvc+totalAspel)}</div>
    <div class="gs-sub">de meta <b>${fmt(metaSvc+metaAspel)}</b> · <b>${fmt(totalComm)}</b> en comisiones</div></div>
    <div>${[{n:'Servicios',v:totalSvc,m:metaSvc},{n:'Aspel',v:totalAspel,m:metaAspel}].map(b=>{
      const p=Math.min(b.v/b.m,1),pp=Math.round(p*100),c=p>=1?'#00A99D':p>=0.8?'#F5A623':'#E84040';
      return `<div class="gs-row"><span class="gs-rn">${b.n}</span><div class="gs-bo"><div class="gs-bf" style="width:${pp}%;background:${c};"></div></div><span class="gs-rp" style="color:${c};">${pp}%</span></div>`;
    }).join('')}</div>
  </div>
  <div class="th4">${[
    {lbl:'Comisiones totales',val:fmt(totalComm),sub:'Equipo este mes'},
    {lbl:'Servicios equipo',val:fmt(totalSvc),sub:`${Math.round(totalSvc/metaSvc*100)}% de meta`},
    {lbl:'Mejor servicio',val:vData.sort((a,b)=>b.tot.svc-a.tot.svc)[0]?.u.nombre.split(' ')[0]||'—',sub:fmt(vData[0]?.tot.svc||0)},

async function renderDirectorVendedores(){
  const mc=document.getElementById('mainContent');
  mc.innerHTML='<div class="loading"><div class="spinner"></div> Cargando...</div>';
  const users=await loadDirectorData();
  const vendedores=users.filter(u=>u.rol==='vendedor');
  const telemarketing=users.filter(u=>u.rol==='telemarketing');
  // Recalcular deptoAlcanzado para el mes actual — getRate() depende de esto y no debe
  // quedarse con el valor de un render anterior (mismo fix aplicado en renderDirectorResumen)
  const metaDeptoRowV=kpiConfig.find(k=>k.kpi_key==='meta_depto');
  metaDepto=metaDeptoRowV?metaDeptoRowV.meta_dulce:160000;
  const totalSvcPreliminarV=vendedores.reduce((s,u)=>s+getTotals(allRegistros,u.id).svc,0);
  deptoAlcanzado=totalSvcPreliminarV>=metaDepto;
  // Cargar ajustes manuales del mes (una sola consulta, no por vendedor)
  const {data:ajustesMesV}=await sb.from('ajustes_comision').select('*').eq('anio',currentYear).eq('mes',currentMonth);
  const ajustesPorUsuarioV={};
  (ajustesMesV||[]).forEach(a=>{ajustesPorUsuarioV[a.usuario_id]=a;});
  const diasHab=getDiasHabiles(currentYear,currentMonth);
  const hoy=new Date();
  const esEsteMes=hoy.getMonth()+1===currentMonth&&hoy.getFullYear()===currentYear;
  const diasTrans=esEsteMes?getDiasTranscurridos(currentYear,currentMonth):diasHab;
  const diasRest=Math.max(diasHab-diasTrans,0);
  mc.innerHTML=`
  <div class="shead">Vendedores B2B</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;">${vendedores.map(u=>{
    const tot=getTotals(allRegistros,u.id);
    const metaKey=u.email.toLowerCase().includes('dulce')?'meta_dulce':'meta_manuel';

    const svcMeta=svcM?svcM[metaKey]:80000;
    const rAuto=getRate(tot.svc,svcMeta,u),cAuto=tot.svc*rAuto;
    const ajusteUV=ajustesPorUsuarioV[u.id]||null;
    const ajResV=aplicarAjusteComision(cAuto,rAuto,tot.svc,ajusteUV);
    const r=ajResV.tasaFinal,c=ajResV.comisionFinal;
    const col=u.email.toLowerCase().includes('dulce')?'#00A99D':'#0D2240';
    const ini=u.nombre.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
    const gap=Math.max(svcMeta-tot.svc,0),perDay=diasRest>0&&gap>0?gap/diasRest:0;
    const avgDay=diasTrans>0?tot.svc/diasTrans:0;
    const projFin=tot.svc+avgDay*diasRest;
    const projComm=getComm(projFin,svcMeta,userProfile);
    const allK=kpiConfig.filter(k=>!/_m$/.test(k.kpi_key)).map(k=>{
      const totMap=buildTotMap(tot);
      const kv=totMap[k.kpi_key]||0,km=k[metaKey]||1,p=Math.min(kv/km,1),pc=pcol(p);
      const vf=k.tipo==='$'?fmt(kv):kv,mf=k.tipo==='$'?fmt(km):km;
      const tag=k.categoria==='principal'?'<span class="badge bt" style="font-size:9px;padding:1px 5px;">p</span>':k.categoria==='extra'?'<span class="badge bo" style="font-size:9px;padding:1px 5px;">e</span>':'';
      return `<div style="padding:7px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;">
        <span style="flex:1;font-size:12px;color:var(--text2);">${k.kpi_nombre} ${tag}</span>
        <span style="font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:${pc};">${vf}</span>
        <span style="font-size:10px;color:var(--text3);">/${mf}</span>
        <div style="width:50px;height:4px;background:var(--bg);border-radius:2px;overflow:hidden;"><div style="height:100%;width:${Math.round(p*100)}%;background:${pc};border-radius:2px;"></div></div>
        <span style="font-size:11px;font-weight:600;color:${pc};min-width:28px;text-align:right;">${Math.round(p*100)}%</span>
      </div>`;}).join('');
    return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--rad);overflow:hidden;">
      <div style="background:${col};padding:14px 18px;display:flex;align-items:center;justify-content:space-between;">
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;">${ini}</div>
          <div><div style="font-size:14px;font-weight:600;color:#fff;">${u.nombre}${ajResV.tieneAjuste?' <span style="font-size:9px;background:rgba(255,255,255,0.25);padding:1px 6px;border-radius:10px;">⭐ ajuste</span>':''}</div><div style="font-size:11px;color:rgba(255,255,255,0.6);">Vendedor B2B</div></div>
        </div>
        <div style="text-align:right;"><div style="font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;color:#fff;">${fmt(c)}</div><div style="font-size:11px;color:rgba(255,255,255,0.55);">tasa ${(r*100).toFixed(1)}%</div></div>
      </div>
      <div style="padding:12px 18px 0;">${allK}</div>
      <div style="padding:12px 18px;background:var(--surf2);display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px;">
        <div><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:3px;">Proyección cierre</div>
          <div style="font-size:16px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--text);">${fmt(projFin)}</div>
          <div style="font-size:11px;color:var(--text3);">Comisión: <b style="color:var(--teal);">${fmt(projComm)}</b></div>
        </div>
        <div><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:3px;">Necesita por día</div>
          <div style="font-size:16px;font-weight:700;font-family:'JetBrains Mono',monospace;color:${gap>0?'#F5A623':'#27AE60'};">${gap>0?fmt(perDay):'✓ Meta ok'}</div>
          <div style="font-size:11px;color:var(--text3);">${diasRest} días restantes</div>
        </div>
      </div>
      <div style="padding:10px 18px;border-top:1px solid var(--border);">
        <button onclick="verRegistrosVendedor(this.dataset.uid,this.dataset.unm)" data-uid="${u.id}" data-unm="${u.nombre}"

          📋 Ver registros y auditar
        </button>
      </div>
    </div>`;
  }).join('')}</div>
  ${(()=>{
    if(!telemarketing||telemarketing.length===0) return '';
    const rows=telemarketing.map(u=>{
      const tot=getTotals(allRegistros,u.id);
      const col='#5B4FCF';
      const ini=u.nombre.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
      const kpiTele=[
        {n:'Llamadas efectivas',v:tot.llamadas,m:300},
        {n:'Prospectos canalizados',v:tot.prospectos,m:40},
        {n:'Confirmaciones',v:tot.confirmaciones,m:60},
        {n:'Seguimientos',v:tot.seguimientos,m:100},

      const bonoPros=tot.prospectos>=15?tot.prospectos*50:0;
      const kpiRows=kpiTele.map(k=>{
        const p=Math.min(k.v/(k.m||1),1);
        const pc=pcol(p);
        const pct=Math.round(p*100);
        return '<div style="padding:7px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;">'
          +'<span style="flex:1;font-size:12px;color:var(--text2);">'+k.n+'</span>'
          +'<span style="font-weight:600;font-size:12px;color:'+pc+';">'+k.v+'</span>'
          +'<span style="font-size:10px;color:var(--text3);">/'+k.m+'</span>'

          +'<div style="height:100%;width:'+pct+'%;background:'+pc+';border-radius:2px;"></div></div>'
          +'<span style="font-size:11px;font-weight:600;color:'+pc+';min-width:28px;text-align:right;">'+pct+'%</span>'

        +'<div style="display:flex;align-items:center;gap:10px;">'

    return '<div class="shead" style="margin-top:8px;">Telemarketing</div>'

async function verRegistrosVendedor(userId, nombre){

async function renderDirectorAnual(){
  const mc=document.getElementById('mainContent');
  mc.innerHTML='<div class="loading"><div class="spinner"></div> Cargando año completo...</div>';
  const {data:users}=await sb.from('usuarios').select('*').eq('activo',true).eq('rol','vendedor').order('nombre');
  const vendedores=users||[];
  if(!vendedores.length){mc.innerHTML='<div class="loading">No hay vendedores activos.</div>';return;}

  // Cargar TODO el año de una sola vez por tabla (no 12 queries por mes)
  const desde=`${currentYear}-01-01`, hasta=`${currentYear}-12-31`;
  const {data:regsAnio}=await sb.from('registros_diarios').select('*').gte('fecha',desde).lte('fecha',hasta);
  const {data:kpiAnio}=await sb.from('kpi_config').select('*').eq('anio',currentYear);
  const {data:ajustesAnio}=await sb.from('ajustes_comision').select('*').eq('anio',currentYear);
  const regs=regsAnio||[];

  const MESES_N=['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const MESES_FULL=['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

  // Procesar cada mes del año
  const mesesData={};
  for(let m=1;m<=12;m++){
    const kpiMes=(kpiAnio||[]).filter(k=>k.mes===m);
    const kpiCfgMes=kpiMes.length>0?kpiMes:getDefaultKpiConfig(currentYear,m);
    const metaDeptoRow=kpiMes.find(k=>k.kpi_key==='meta_depto');
    const metaDeptoMes=metaDeptoRow?metaDeptoRow.meta_dulce:160000;
    const ajustesMes=(ajustesAnio||[]).filter(a=>a.mes===m);

    let totalSvc=0,totalAspel=0,totalIt=0,totalSus=0,totalComm=0;
    const porVendedor={};
    vendedores.forEach(u=>{
      const regsUsuarioMes=regs.filter(r=>r.usuario_id===u.id&&parseInt(r.fecha.slice(5,7))===m);
      const svc=regsUsuarioMes.reduce((s,r)=>s+(r.svc||0),0);
      const aspel=regsUsuarioMes.reduce((s,r)=>s+(r.aspel||0),0);
      const it=regsUsuarioMes.reduce((s,r)=>s+(r.it||0),0);
      const sus=regsUsuarioMes.reduce((s,r)=>s+(r.suscripciones||0),0);
      totalSvc+=svc; totalAspel+=aspel; totalIt+=it; totalSus+=sus;
      porVendedor[u.id]={svc,aspel,it,sus};
    });
    deptoAlcanzado=totalSvc>=metaDeptoMes; // global usado por getRate()
    metaDepto=metaDeptoMes;
    vendedores.forEach(u=>{
      const svcKpi=kpiCfgMes.find(k=>k.kpi_key==='svc');
      const metaKey=u.email.toLowerCase().includes('dulce')?'meta_dulce':'meta_manuel';
      const svcMeta=svcKpi?svcKpi[metaKey]:80000;
      const svcVendedor=porVendedor[u.id].svc;
      const rAuto=getRate(svcVendedor,svcMeta,u);
      const cAuto=svcVendedor*rAuto;
      const ajusteU=ajustesMes.find(a=>a.usuario_id===u.id)||null;
      const ajRes=aplicarAjusteComision(cAuto,rAuto,svcVendedor,ajusteU);
      totalComm+=ajRes.comisionFinal;
    });

    mesesData[m]={
      totalSvc,totalAspel,totalIt,totalSus,totalComm,
      metaDepto:metaDeptoMes,deptoOk:totalSvc>=metaDeptoMes,
      tieneAjuste:ajustesMes.length>0,
      porVendedor
    };
  }

  // Totales y resúmenes del año
  const totalSvcAnio=Object.values(mesesData).reduce((s,d)=>s+d.totalSvc,0);
  const totalCommAnio=Object.values(mesesData).reduce((s,d)=>s+d.totalComm,0);
  const totalComplementarioAnio=Object.values(mesesData).reduce((s,d)=>s+d.totalAspel+d.totalIt+d.totalSus,0);
  const mesesMetaOk=Object.values(mesesData).filter(d=>d.deptoOk&&d.totalSvc>0).length;
  const mesesConAjuste=Object.values(mesesData).filter(d=>d.tieneAjuste).length;
  const mesesConData=Object.values(mesesData).filter(d=>d.totalSvc>0).length;

  // Datos para gráficas (12 meses, Dulce vs Manuel)
  const dulceU=vendedores.find(u=>u.email.toLowerCase().includes('dulce'));
  const manuelU=vendedores.find(u=>u.email.toLowerCase().includes('manuel'));
  const svcDulce=[],svcManuel=[],commDulce=[],commManuel=[];
  for(let m=1;m<=12;m++){
    svcDulce.push(dulceU?Math.round(mesesData[m].porVendedor[dulceU.id]?.svc||0):0);
    svcManuel.push(manuelU?Math.round(mesesData[m].porVendedor[manuelU.id]?.svc||0):0);
  }
  // Comisión individual por vendedor por mes (recalculando con ajuste, reutilizando lo ya hecho arriba sería más limpio,
  // pero se necesita por separado para la gráfica de barras Dulce vs Manuel)
  for(let m=1;m<=12;m++){
    const kpiMes=(kpiAnio||[]).filter(k=>k.mes===m);
    const kpiCfgMes=kpiMes.length>0?kpiMes:getDefaultKpiConfig(currentYear,m);
    const ajustesMes=(ajustesAnio||[]).filter(a=>a.mes===m);
    deptoAlcanzado=mesesData[m].deptoOk; metaDepto=mesesData[m].metaDepto;
    [dulceU,manuelU].forEach((u,idx)=>{
      if(!u){(idx===0?commDulce:commManuel).push(0);return;}
      const svcKpi=kpiCfgMes.find(k=>k.kpi_key==='svc');
      const metaKey=u.email.toLowerCase().includes('dulce')?'meta_dulce':'meta_manuel';
      const svcMeta=svcKpi?svcKpi[metaKey]:80000;
      const svcVendedor=mesesData[m].porVendedor[u.id]?.svc||0;
      const rAuto=getRate(svcVendedor,svcMeta,u);
      const cAuto=svcVendedor*rAuto;
      const ajusteU=ajustesMes.find(a=>a.usuario_id===u.id)||null;
      const ajRes=aplicarAjusteComision(cAuto,rAuto,svcVendedor,ajusteU);

const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
function getNombreMes(m){return MESES[m-1]||'';}
function getDiasHabiles(y,m){
  // Aproximación — días laborables del mes
  let count=0;
  const d=new Date(y,m-1,1);
  while(d.getMonth()===m-1){const dw=d.getDay();if(dw>0&&dw<6)count++;d.setDate(d.getDate()+1);}
  return count;
}
function getDiasTranscurridos(y,m){
  const hoy=new Date();let count=0;
  const d=new Date(y,m-1,1);
  while(d<hoy&&d.getMonth()===m-1){const dw=d.getDay();if(dw>0&&dw<6)count++;d.setDate(d.getDate()+1);}
  return count;
}

async function registrarLlamadaCuentaTele(clienteId, campanaId){
  const resultado=document.querySelector('input[name="resCuenta"]:checked')?.value;
  if(!resultado){alert('Selecciona el resultado de la llamada');return;}
  const notaOpcional=['No contestó','Buzón'];
  let nota=document.getElementById('notasCuentaLlamada')?.value.trim()||'';
  if(!notaOpcional.includes(resultado)&&!nota){
    alert('Para "'+resultado+'" es obligatorio escribir una nota.');
    document.getElementById('notasCuentaLlamada')?.focus();
    return;
  }
  const interesCheck=document.getElementById('interesAdicionalCheck')?.checked;
  const interesTexto=document.getElementById('interesAdicionalTexto')?.value.trim()||'';
  if(interesCheck){
    if(!interesTexto){alert('Especifica en qué mostró interés.');document.getElementById('interesAdicionalTexto')?.focus();return;}
    nota=(nota?nota+'\n':'')+'[Interés adicional] '+interesTexto+' — Vendedor notificado.';
  }
  const ahora=new Date();
  const {error}=await sb.from('llamadas_cartera').insert({
    cliente_id:clienteId, campana_id:campanaId, usuario_id:currentUser.id,
    resultado, notas:nota, created_at:ahora.toISOString()
  });
  if(error){alert('Error: '+error.message);return;}
  const {data:histRaw}=await sb.from('llamadas_cartera')
    .select('*').eq('cliente_id',clienteId).eq('campana_id',campanaId).order('created_at',{ascending:false});
  document.getElementById('histCuentaLlamadas').innerHTML=renderLlamadasHtml(histRaw||[]);
  document.querySelectorAll('input[name="resCuenta"]').forEach(r=>r.checked=false);
  const nt=document.getElementById('notasCuentaLlamada');if(nt)nt.value='';
  const cb=document.getElementById('interesAdicionalCheck');if(cb){cb.checked=false;toggleInteresAdicional();}
}

async function renderTele(){
  const mc=document.getElementById('mainContent');
  mc.innerHTML='<div class="loading"><div class="spinner"></div> Cargando...</div>';
  const desde=`${currentYear}-${String(currentMonth).padStart(2,'0')}-01`;
  const lastDay=new Date(currentYear,currentMonth,0).getDate();
  const hasta=`${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`;
  const {data:regs}=await sb.from('registros_diarios').select('*').eq('usuario_id',currentUser.id).gte('fecha',desde).lte('fecha',hasta).order('fecha');
  const rs=regs||[];
  // Totals
  const tot={llamadas:0,prospectos:0,confirmaciones:0,siigo:0,seguimientos:0,cursos:0,renovaciones:0,crm:0};
  for(const r of rs){
    tot.llamadas+=r.llamadas_efectivas||0;
    tot.prospectos+=r.prospectos_canalizados||0;

async function saveTeleRegistro(fecha,llamadasAuto,canalizadosAuto,llamadasCartAuto){
  const btn=document.getElementById('btnSave');
  const msg=document.getElementById('saveMsg');
  btn.disabled=true;btn.textContent='Guardando...';
  const today=todayLocal();
  const esDiaPasado=fecha!==today;
  let notasLog='';
  if(esDiaPasado){
    const ahora=new Date();
    const hora=ahora.getHours()+':'+String(ahora.getMinutes()).padStart(2,'0');
    notasLog=`✏️ Editado el ${fmtFecha(today)} a las ${hora}`;
  }
  // Venta de cursos automática: se mantiene el valor ya existente
  const {data:existingVenta}=await sb.from('registros_diarios').select('venta_cursos_tele').eq('usuario_id',currentUser.id).eq('fecha',fecha).maybeSingle();
  const payload={
    usuario_id:currentUser.id,fecha,
    llamadas_efectivas:llamadasAuto,
    prospectos_canalizados:canalizadosAuto,
    llamadas_cartera:llamadasCartAuto||parseInt(document.getElementById('fLlamCart')?.value)||0,
    confirmaciones_evento:parseInt(document.getElementById('fConf').value)||0,
    siigo_activaciones:parseInt(document.getElementById('fSiigo').value)||0,
    seguimientos_post:parseInt(document.getElementById('fSeg').value)||0,
    venta_cursos_tele:existingVenta?.venta_cursos_tele||0,
    renovaciones:parseInt(document.getElementById('fRen')?document.getElementById('fRen').value:0)||0,
    crm_actualizaciones:parseInt(document.getElementById('fCrm')?document.getElementById('fCrm').value:0)||0,
    updated_at:new Date().toISOString(),
  };
  if(notasLog) payload.notas=notasLog;
  const {error}=await sb.from('registros_diarios').upsert(payload,{onConflict:'usuario_id,fecha'});
  btn.disabled=false;btn.textContent='💾 Guardar registro';
  if(error){msg.style.color='var(--red)';msg.textContent='Error: '+error.message;}
  else{msg.style.color='var(--green)';msg.textContent='✓ Registro guardado correctamente';}
}

async function autoRegistrarDiasCartera(registrosExistentes){
  const {data:llCart}=await sb.from('llamadas_cartera')
    .select('created_at').eq('usuario_id',currentUser.id);
  if(!llCart||!llCart.length) return;
  const diasConLlamadas={};
  llCart.forEach(l=>{
    const d=(l.created_at||'').slice(0,10);
    if(d) diasConLlamadas[d]=(diasConLlamadas[d]||0)+1;
  });
  const fechasConRegistro=new Set((registrosExistentes||[]).map(r=>r.fecha));
  const today=todayLocal();
  for(const [fecha,count] of Object.entries(diasConLlamadas)){
    if(fecha>=today) continue;
    if(fechasConRegistro.has(fecha)) continue;
    await sb.from('registros_diarios').insert({
      usuario_id:currentUser.id, fecha,
      llamadas_efectivas:0, prospectos_canalizados:0,
      llamadas_cartera:count,
      notas:'⚙️ Registro automático — se detectaron '+count+' llamada(s) a cartera pero el vendedor no registró el día.',
      updated_at:new Date().toISOString()
    });
  }
}

  const {data:regs}=await sb.from('registros_diarios').select('*').eq('usuario_id',currentUser.id).order('fecha',{ascending:false});
  await autoRegistrarDiasCartera(regs||[]);
  const {data:regs2}=await sb.from('registros_diarios').select('*').eq('usuario_id',currentUser.id).order('fecha',{ascending:false});
  window._teleHistRows=regs2||[];
  renderTeleHistTabla();
}

function renderTeleHistTabla(){
  const mc=document.getElementById('mainContent');
  if(!mc) return;
  let rows=window._teleHistRows||[];
  if(teleHistFiltroMes) rows=rows.filter(r=>r.fecha&&r.fecha.slice(0,7)===teleHistFiltroMes);
  const mesesUnicos=[...new Set((window._teleHistRows||[]).map(r=>r.fecha?r.fecha.slice(0,7):null).filter(Boolean))].sort().reverse();

  // Totales
  const tot={
    llamadas:rows.reduce((s,r)=>s+(r.llamadas_efectivas||0),0),
    cartera:rows.reduce((s,r)=>s+(r.llamadas_cartera||0),0),
    prospectos:rows.reduce((s,r)=>s+(r.prospectos_canalizados||0),0),
    confirmaciones:rows.reduce((s,r)=>s+(r.confirmaciones_evento||0),0),
    siigo:rows.reduce((s,r)=>s+(r.siigo_activaciones||0),0),
    seguimientos:rows.reduce((s,r)=>s+(r.seguimientos_post||0),0),
    crm:rows.reduce((s,r)=>s+(r.crm_actualizaciones||0),0),
  };

  mc.innerHTML=`
  <div class="card">
    <div class="card-head" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
      <div><span class="card-title">Histórico de actividad</span><span class="badge bt" style="margin-left:8px;">${rows.length} días</span></div>
      <select onchange="teleHistFiltroMes=this.value;renderTeleHistTabla()" style="padding:6px 10px;border:1px solid var(--border);border-radius:var(--radsm);font-size:12px;font-family:'Inter',sans-serif;">
        <option value="">Todos los meses</option>
        ${mesesUnicos.map(m=>`<option value="${m}" ${teleHistFiltroMes===m?'selected':''}>${m}</option>`).join('')}
      </select>
    </div>
    <div style="font-size:11px;color:var(--text3);padding:8px 16px 0;">Haz clic en cualquier fila para ver el detalle completo del día.</div>
    <table class="daily">
      <thead><tr>
        <th></th><th>Fecha</th><th>Llamadas</th><th>Cartera</th><th>Prospectos</th>
        <th>Confirmaciones</th><th>Siigo</th><th>Seguimientos</th><th>Actualiz. CRM</th>
      </tr></thead>
      <tbody>
        ${rows.map((r,idx)=>`<tr onclick="toggleTeleHistDetalle(${idx})" style="cursor:pointer;" id="teleHistRow_${idx}">
          <td style="width:18px;color:var(--text3);font-size:10px;" id="teleHistArrow_${idx}">▸</td>
          <td style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);">${fmtFecha(r.fecha)||r.fecha}${r.notas&&r.notas.includes('automático')?'<span style="margin-left:5px;font-size:9px;background:#2980B9;color:#fff;border-radius:3px;padding:1px 4px;vertical-align:middle;">AUTO</span>':''}</td>
          <td style="text-align:center;">${r.llamadas_efectivas||0}</td>
          <td style="text-align:center;font-weight:600;color:${(r.llamadas_cartera||0)>0?'#2980B9':'var(--text3)'};">${r.llamadas_cartera||0}</td>
          <td style="text-align:center;font-weight:600;color:${(r.prospectos_canalizados||0)>0?'#00A99D':'var(--text3)'};">${r.prospectos_canalizados||0}</td>
          <td style="text-align:center;">${r.confirmaciones_evento||0}</td>
          <td style="text-align:center;">${r.siigo_activaciones||0}</td>
          <td style="text-align:center;">${r.seguimientos_post||0}</td>
          <td style="text-align:center;">${r.crm_actualizaciones||0}</td>
        </tr>
        <tr id="teleHistDetalle_${idx}" style="display:none;"><td colspan="9" style="padding:0;background:var(--surface-2,#f8f9fa);">
          ${renderTeleHistDetalleContenido(r)}
        </td></tr>`).join('')||'<tr><td colspan="9" style="text-align:center;padding:20px;color:var(--text3);">Sin registros</td></tr>'}
      </tbody>
      ${rows.length?`<tfoot><tr style="background:var(--navy);color:#fff;font-weight:700;">
        <td colspan="2" style="padding:8px 12px;font-size:12px;">TOTAL</td>
        <td style="text-align:center;">${tot.llamadas}</td>
        <td style="text-align:center;color:#5bf;">${tot.cartera||'—'}</td>
        <td style="text-align:center;color:#5ff;">${tot.prospectos||'—'}</td>
        <td style="text-align:center;">${tot.confirmaciones||'—'}</td>
        <td style="text-align:center;">${tot.siigo||'—'}</td>
        <td style="text-align:center;">${tot.seguimientos||'—'}</td>
        <td style="text-align:center;">${tot.crm||'—'}</td>
      </tr></tfoot>`:''}
    </table>
  </div>`;
}

function renderTeleHistDetalleContenido(r){
  const campo=(label,val,esMoneda)=>{
    const tieneValor=(val||0)>0;
    return `<div>
      <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.04em;">${label}</div>
      <div style="font-size:13px;font-weight:600;color:${tieneValor?'var(--text)':'var(--text3)'};font-family:'JetBrains Mono',monospace;">
        ${tieneValor?(esMoneda?fmt(val):val):'—'}
      </div>
    </div>`;
  };
  return `
  <div style="padding:16px 24px;display:grid;grid-template-columns:repeat(4,1fr);gap:16px;">
    <div style="grid-column:1/-1;font-size:10px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:-6px;">Telemarketing</div>
    ${campo('Llamadas efectivas',r.llamadas_efectivas,false)}
    ${campo('Prospectos canalizados',r.prospectos_canalizados,false)}
    ${campo('Confirmaciones a evento',r.confirmaciones_evento,false)}
    ${campo('Seguimientos post-evento',r.seguimientos_post,false)}

    <div style="grid-column:1/-1;font-size:10px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:0.06em;margin:6px 0 -6px;">Ventas directas</div>
    ${campo('Venta Cursos 24/7',r.venta_cursos_tele,true)}
    ${campo('Siigo Fiscal cerrados',r.siigo_activaciones,false)}
    ${campo('Renovaciones Aspel',r.renovaciones,false)}

    <div style="grid-column:1/-1;font-size:10px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:0.06em;margin:6px 0 -6px;">Gestión de cuentas</div>
    ${campo('Actualización cuentas CRM',r.crm_actualizaciones,false)}
  </div>`;
}

function toggleTeleHistDetalle(idx){
  const det=document.getElementById('teleHistDetalle_'+idx);
  const arrow=document.getElementById('teleHistArrow_'+idx);
  if(!det) return;
  const abierto=det.style.display!=='none';
  det.style.display=abierto?'none':'table-row';
  if(arrow) arrow.textContent=abierto?'▸':'▾';
}

function filaProspecto(p){
  const col=ESTATUS_COLORS[p.estatus]||'#888';
  const fecha=p.fecha_contacto?p.fecha_contacto.slice(5):'—';
  return `<tr id="row_${p.id}">
    <td style="font-weight:500;">${p.nombre}</td>
    <td style="font-family:'JetBrains Mono',monospace;font-size:11px;">${p.telefono||'—'}</td>
    <td style="font-size:11px;color:var(--text3);">${p.evento||'—'}</td>
    <td>
      <select onchange="actualizarEstatus('${p.id}',this.value)"
        style="font-size:11px;padding:3px 6px;border:1px solid var(--border);border-radius:5px;color:${col};font-weight:600;background:white;cursor:pointer;">
        ${Object.keys(ESTATUS_COLORS).map(e=>`<option value="${e}" ${e===p.estatus?'selected':''}>${e}</option>`).join('')}
      </select>
    </td>
    <td style="font-size:11px;color:var(--text3);">${fecha}</td>
    <td>
      <div style="display:flex;gap:5px;align-items:center;">
        <button onclick="abrirDetalle('${p.id}')"
          style="background:var(--teal);color:#fff;border:none;border-radius:5px;padding:4px 9px;font-size:10px;cursor:pointer;font-family:'Inter',sans-serif;">
          Ver
        </button>
        ${p.vtiger_url
          ? `<a href="${p.vtiger_url}" target="_blank"
              style="background:var(--navy);color:#fff;border:none;border-radius:5px;padding:4px 9px;font-size:10px;cursor:pointer;text-decoration:none;">
              VTiger ↗</a>`
          : `<button onclick="agregarVtigerUrl('${p.id}')"
              style="background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-b);border-radius:5px;padding:4px 9px;font-size:10px;cursor:pointer;font-family:'Inter',sans-serif;">
              + VTiger</button>`}
        <button onclick="toggleRespondio('${p.id}')" title="¿Actualizado en Respond.io?"
          style="background:${p.respondio_ok?'rgba(39,174,96,0.12)':'var(--surf2)'};color:${p.respondio_ok?'#27AE60':'var(--text3)'};border:1px solid ${p.respondio_ok?'rgba(39,174,96,0.3)':'var(--border)'};border-radius:5px;padding:4px 9px;font-size:10px;cursor:pointer;font-family:'Inter',sans-serif;">
          ${p.respondio_ok?'✓ Respond.io':'Respond.io'}
        </button>
      </div>
    </td>
  </tr>`;
}

function filtrarProspectos(){
  const filtro=document.getElementById('filtroEstatus')?.value||'';
  const filtroEv=document.getElementById('filtroEvento')?.value||'';
  const buscar=document.getElementById('buscarPros')?.value.toLowerCase()||'';
  const ps=window._prospectos||[];
  const filtrados=ps.filter(p=>{
    const matchEstatus=!filtro||p.estatus===filtro;
    const matchEvento=!filtroEv||p.evento===filtroEv;
    const matchBuscar=!buscar||(p.nombre||'').toLowerCase().includes(buscar)||(p.telefono||'').includes(buscar);
    return matchEstatus&&matchEvento&&matchBuscar;
  });
  const tbody=document.getElementById('bodyProspectos');
  if(tbody) tbody.innerHTML=filtrados.map(p=>filaProspecto(p)).join('');
}

async function actualizarEstatus(id, estatus){
  const hoy=todayLocal();
  const {error}=await sb.from('prospectos').update({
    estatus, fecha_contacto:hoy, updated_at:new Date().toISOString()
  }).eq('id',id);
  if(!error){
    // Update local data
    const p=window._prospectos?.find(p=>p.id===id);
    if(p){p.estatus=estatus;p.fecha_contacto=hoy;}
    // If canalizado, ask for vendedor and offer VTiger
    if(estatus==='Canalizado a ventas'){
      const {data:vendedores}=await sb.from('usuarios').select('id,nombre').eq('rol','vendedor').eq('activo',true).order('nombre');
      const lista=(vendedores||[]).map((v,i)=>`${i+1}. ${v.nombre}`).join('\n');
      const seleccion=prompt(`¡Prospecto canalizado! 🎯\n\n¿Qué vendedor lo toma? Escribe el número:\n${lista}`);
      const idx=parseInt(seleccion)-1;
      if(vendedores&&vendedores[idx]){
        await sb.from('prospectos').update({vendedor_asignado:vendedores[idx].id}).eq('id',id);
        if(p) p.vendedor_asignado=vendedores[idx].id;
      }
      const vtUrl=prompt('Pega el URL del contacto en VTiger (opcional):');
      if(vtUrl&&vtUrl.trim()){
        await sb.from('prospectos').update({vtiger_url:vtUrl.trim()}).eq('id',id);
        if(p) p.vtiger_url=vtUrl.trim();
      }
    }
    // Refresh row
    const row=document.getElementById('row_'+id);
    if(row&&window._prospectos){
      const updated=window._prospectos.find(p=>p.id===id);
      if(updated) row.outerHTML=filaProspecto(updated);
    }
  }
}

async function agregarVtigerUrl(id){
  const vtUrl=prompt('Pega el URL del contacto en VTiger:');
  if(vtUrl&&vtUrl.trim()){
    await sb.from('prospectos').update({vtiger_url:vtUrl.trim()}).eq('id',id);
    const p=window._prospectos?.find(p=>p.id===id);
    if(p){p.vtiger_url=vtUrl.trim();}
    const row=document.getElementById('row_'+id);
    if(row&&p) row.outerHTML=filaProspecto(p);
    if(document.getElementById('modalDetalle')) abrirDetalle(id);
  }
}

async function toggleRespondio(id){
  const p=window._prospectos?.find(p=>p.id===id);
  const nuevoValor=!(p?.respondio_ok);
  const {error}=await sb.from('prospectos').update({respondio_ok:nuevoValor}).eq('id',id);
  if(error){alert('Error al actualizar: '+error.message);return;}
  if(p) p.respondio_ok=nuevoValor;
  const row=document.getElementById('row_'+id);
  if(row&&p) row.outerHTML=filaProspecto(p);
}

async function toggleRespondioModal(id,checked){
  const {error}=await sb.from('prospectos').update({respondio_ok:checked}).eq('id',id);
  if(error){alert('Error al actualizar: '+error.message);return;}
  const p=window._prospectos?.find(p=>p.id===id);
  if(p) p.respondio_ok=checked;
}

async function toggleNoContactar(id,checked){
  if(checked&&!confirm('¿Confirmas que este prospecto NO debe volver a ser contactado? No podrá agregarse a campañas futuras.')){
    const chk=document.getElementById('chkNoContactar');
    if(chk) chk.checked=false;
    return;
  }
  const {error}=await sb.from('prospectos').update({no_contactar:checked}).eq('id',id);
  if(error){alert('Error al actualizar: '+error.message);return;}
  const p=window._prospectos?.find(p=>p.id===id);
  if(p) p.no_contactar=checked;
}

async function abrirDetalleDir(id){
  // Asegurar que _prospectos tenga los datos del director
  if(!window._prospectos||!window._prospectos.find(p=>p.id===id)){
    window._prospectos=window._dirProspectos||[];
  }
  window._modalModoDirector=true; // flag para ocultar sección de registrar llamada
  await abrirDetalle(id);
}

async function abrirDetalle(id){
  const ps=window._prospectos||[];
  const idx=ps.findIndex(p=>p.id===id);
  if(idx<0) return;
  const p=ps[idx];

  // Fetch historial en paralelo
  const [evRes, llRes, vendRes, campRelRes, allUsersRes]=await Promise.all([
    sb.from('prospecto_eventos').select('*').eq('prospecto_id',id).order('fecha_registro',{ascending:true}),
    sb.from('prospecto_llamadas').select('*').eq('prospecto_id',id).order('created_at',{ascending:false}),
    sb.from('usuarios').select('id,nombre').eq('rol','vendedor').eq('activo',true).order('nombre'),
    sb.from('campana_prospectos').select('campana_id,fecha_agregado').eq('prospecto_id',id).order('fecha_agregado',{ascending:false}),
    sb.from('usuarios').select('id,nombre')
  ]);
  const eventos=evRes.data||[];
  const todosUsuarios=allUsersRes.data||[];
  const llamadas=(llRes.data||[]).map(l=>({...l,usuarios:{nombre:todosUsuarios.find(u=>u.id===l.usuario_id)?.nombre||'—'}}));
  const vendedoresB2B=vendRes.data||[];
  const campanaRelaciones=campRelRes.data||[];
  let historialCampanas=[];
  if(campanaRelaciones.length){
    const idsCamp=campanaRelaciones.map(r=>r.campana_id);
    const {data:campanasInfo}=await sb.from('campanas').select('id,nombre').in('id',idsCamp);
    historialCampanas=campanaRelaciones.map(r=>({

function onResultadoLlamadaChange(){
  const valor=document.querySelector('input[name="resLlamada"]:checked')?.value;
  const campoVend=document.getElementById('campoVendedorCanaliza');
  const campoMonto=document.getElementById('campoMontoCompra');
  if(campoVend) campoVend.style.display=valor==='Canalizado a ventas'?'block':'none';
  if(campoMonto) campoMonto.style.display=valor==='Compró el taller 24/7'?'block':'none';
}

function renderLlamadasHtml(llamadas){
  if(!llamadas||!llamadas.length)
    return `<div style="font-size:12px;color:var(--text3);font-style:italic;">Sin llamadas registradas</div>`;
  return llamadas.map(l=>{
    const res=l.resultado||'';
    const col=res==='Interesado'?'#27AE60':res==='No le interesa'?'#E74C3C':res==='Buzón'?'#E74C3C':res==='Volver a llamar'?'#F5A623':res==='Canalizado a ventas'?'var(--teal)':res==='Compró el taller 24/7'?'var(--teal)':'#888';
    // Mostrar fecha y hora si está disponible
    let fechaHora='—';
    if(l.created_at){
      const d=new Date(l.created_at);
      const fecha=`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
      const hora=`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      fechaHora=`${fecha} ${hora}`;
    } else if(l.fecha){
      const[y,m,dd]=l.fecha.split('-');
      fechaHora=`${dd}/${m}/${y}`;
    }
    const asesor=l.usuarios?.nombre;
    return `<div style="border-left:3px solid ${col};padding:8px 12px;margin-bottom:7px;background:var(--surface);border-radius:0 var(--radsm) var(--radsm) 0;font-size:12px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px;">
        <span style="font-weight:600;color:${col};">${res}</span>
        <span style="color:var(--text3);font-size:10px;text-align:right;">${fechaHora}${asesor&&asesor!=='—'?`<br><span style="color:var(--text3);">${asesor}</span>`:''}</span>
      </div>
      ${l.notas?`<div style="color:var(--text);font-size:11px;">${l.notas}</div>`:''}
    </div>`;
  }).join('');
}

async function registrarLlamada(prospecto_id){
  const resultado=document.querySelector('input[name="resLlamada"]:checked')?.value;
  if(!resultado){alert('Selecciona el resultado de la llamada');return;}
  // Nota obligatoria para todo excepto "No contestó" y "Buzón"
  const notaOpcional=['No contestó','Buzón'];
  const notas=document.getElementById('notasLlamada')?.value.trim()||'';
  if(!notaOpcional.includes(resultado)&&!notas){
    alert('Para el resultado "'+resultado+'" es obligatorio escribir una nota antes de guardar.');
    document.getElementById('notasLlamada')?.focus();
    return;
  }
  let vendedorId=null, montoCompra=null;
  if(resultado==='Canalizado a ventas'){
    vendedorId=document.getElementById('vendedorCanaliza')?.value;
    if(!vendedorId){alert('Selecciona el vendedor que va a tomar este prospecto');return;}
  }
  if(resultado==='Compró el taller 24/7'){
    montoCompra=parseFloat(document.getElementById('montoCompra24_7')?.value);
    if(!montoCompra||montoCompra<=0){alert('Ingresa el monto de la venta');return;}
  }
  const ahora=new Date();
  const hoy=ahora.toISOString().split('T')[0];
  const {error}=await sb.from('prospecto_llamadas').insert({
    prospecto_id, usuario_id:currentUser.id,
    fecha:hoy, resultado, notas, created_at:ahora.toISOString()
  });
  if(error){alert('Error al guardar: '+error.message);return;}
  // Update fecha_contacto in prospectos
  const updProspecto={fecha_contacto:hoy,updated_at:ahora.toISOString()};
  if(resultado==='Canalizado a ventas'){
    updProspecto.estatus='Canalizado a ventas';
    updProspecto.vendedor_asignado=vendedorId;
  }
  if(resultado==='Compró el taller 24/7'){
    updProspecto.estatus='Cliente 24/7';
  }
  await sb.from('prospectos').update(updProspecto).eq('id',prospecto_id);
  const p=window._prospectos?.find(p=>p.id===prospecto_id);
  if(p) Object.assign(p,updProspecto);
  // Si compró, sumar el monto a la venta de cursos del día
  if(resultado==='Compró el taller 24/7'){
    const {data:regHoy}=await sb.from('registros_diarios').select('venta_cursos_tele').eq('usuario_id',currentUser.id).eq('fecha',hoy).maybeSingle();
    const nuevoTotal=(regHoy?.venta_cursos_tele||0)+montoCompra;
    const {error:errVenta}=await sb.from('registros_diarios').upsert({
      usuario_id:currentUser.id,fecha:hoy,venta_cursos_tele:nuevoTotal,updated_at:ahora.toISOString()
    },{onConflict:'usuario_id,fecha'});
    if(errVenta){alert('La llamada se guardó, pero hubo un error al registrar la venta del día: '+errVenta.message);}
  }
  // Refresh historial
  const {data:llamadasRaw}=await sb.from('prospecto_llamadas').select('*').eq('prospecto_id',prospecto_id).order('created_at',{ascending:false});
  const {data:todosUsuariosRefresh}=await sb.from('usuarios').select('id,nombre');
  const llamadas=(llamadasRaw||[]).map(l=>({...l,usuarios:{nombre:(todosUsuariosRefresh||[]).find(u=>u.id===l.usuario_id)?.nombre||'—'}}));
  const hist=document.getElementById('histLlamadas');
  if(hist) hist.innerHTML=renderLlamadasHtml(llamadas);
  // Reset form
  document.querySelectorAll('input[name="resLlamada"]').forEach(r=>r.checked=false);
  const nt=document.getElementById('notasLlamada');
  if(nt) nt.value='';
  onResultadoLlamadaChange();
}

async function guardarDatosProspecto(id){
  const nombre=document.getElementById('editNombre')?.value.trim();
  const telefono=document.getElementById('editTelefono')?.value.trim();
  const email=document.getElementById('editEmail')?.value.trim();
  const empresa=document.getElementById('editEmpresa')?.value.trim();
  const msg=document.getElementById('datosMsg');
  if(!nombre){if(msg){msg.style.color='var(--red)';msg.textContent='El nombre no puede quedar vacío';}return;}
  const upd={nombre,telefono,email,empresa,updated_at:new Date().toISOString()};
  const {error}=await sb.from('prospectos').update(upd).eq('id',id);
  if(error){if(msg){msg.style.color='var(--red)';msg.textContent='Error: '+error.message;}return;}
  const p=window._prospectos?.find(p=>p.id===id);
  if(p) Object.assign(p,upd);
  if(msg){msg.style.color='var(--green)';msg.textContent='✓ Guardado';}
  // Actualizar nombre visible en el header del modal y en la fila de tabla
  const headerNombre=document.getElementById('modalNombreHeader');
  if(headerNombre) headerNombre.textContent=nombre;
  const row=document.getElementById('row_'+id);
  if(row&&p) row.outerHTML=filaProspecto(p);
}

async function guardarYCerrar(id){
  await guardarProspecto(id);
  document.getElementById('modalDetalle')?.remove();
}

async function guardarYSiguiente(id){
  await guardarProspecto(id);
  // Encontrar el siguiente prospecto en la lista
  const ps=window._prospectos||[];
  const idx=ps.findIndex(p=>p.id===id);
  const siguiente=ps[idx+1];
  if(siguiente){
    document.getElementById('modalDetalle')?.remove();
    await abrirDetalle(siguiente.id);
  } else {
    document.getElementById('modalDetalle')?.remove();
    alert('Este era el último prospecto de la lista.');
  }
}

async function guardarProspecto(id){
  const estatus=document.getElementById('estatusModal')?.value;
  const notas=document.getElementById('notasModal')?.value||'';
  const hoy=todayLocal();
  const upd={notas,updated_at:new Date().toISOString()};
  if(estatus) upd.estatus=estatus;
  if(estatus) upd.fecha_contacto=hoy;
  await sb.from('prospectos').update(upd).eq('id',id);
  const p=window._prospectos?.find(p=>p.id===id);
  if(p){Object.assign(p,upd);}
  if(estatus==='Canalizado a ventas'){
    const {data:vendedores}=await sb.from('usuarios').select('id,nombre').eq('rol','vendedor').eq('activo',true).order('nombre');
    const lista=(vendedores||[]).map((v,i)=>`${i+1}. ${v.nombre}`).join('\n');
    const seleccion=prompt(`¡Prospecto canalizado! 🎯\n\n¿Qué vendedor lo toma? Escribe el número:\n${lista}`);
    const idx=parseInt(seleccion)-1;
    if(vendedores&&vendedores[idx]){
      await sb.from('prospectos').update({vendedor_asignado:vendedores[idx].id}).eq('id',id);
      if(p) p.vendedor_asignado=vendedores[idx].id;
    }
    const vtUrl=prompt('Pega el URL del contacto en VTiger (opcional):');
    if(vtUrl&&vtUrl.trim()){
      await sb.from('prospectos').update({vtiger_url:vtUrl.trim()}).eq('id',id);
      if(p) p.vtiger_url=vtUrl.trim();
    }
  }
  const row=document.getElementById('row_'+id);
  if(row&&p) row.outerHTML=filaProspecto(p);
  document.getElementById('modalDetalle')?.remove();
}

function modalNav(currentId, dir){
  const ps=window._prospectos||[];
  const idx=ps.findIndex(p=>p.id===currentId);
  const next=dir==='prev'?ps[idx-1]:ps[idx+1];
  if(next) abrirDetalle(next.id);
}

async function renderDirectorCampanas(){
  const mc=document.getElementById('mainContent');
  mc.innerHTML='<div class="loading"><div class="spinner"></div> Cargando campañas...</div>';
  const {data:campanas}=await sb.from('campanas').select('*').order('created_at',{ascending:false});
  const cs=campanas||[];
  // Contar prospectos por campaña
  const {data:todasRelaciones}=await sb.from('campana_prospectos').select('campana_id');
  const conteoPorCampana={};
  (todasRelaciones||[]).forEach(r=>{conteoPorCampana[r.campana_id]=(conteoPorCampana[r.campana_id]||0)+1;});

  // Para campañas activas, cargar llamadas para mostrar avance por resultado
  const activasIds=(cs||[]).filter(c=>c.activa).map(c=>c.id);
  const avancePorCampana={};
  if(activasIds.length){
    const {data:llActivas}=await sb.from('prospecto_llamadas').select('prospecto_id,resultado')
      .in('prospecto_id',
        (await sb.from('campana_prospectos').select('prospecto_id').in('campana_id',activasIds)).data?.map(r=>r.prospecto_id)||[]
      );
    // También necesitamos saber a qué campaña pertenece cada prospecto
    const {data:relActivas}=await sb.from('campana_prospectos').select('campana_id,prospecto_id').in('campana_id',activasIds);
    const prosTocamp={};
    (relActivas||[]).forEach(r=>{prosTocamp[r.prospecto_id]=r.campana_id;});
    // Agrupar última llamada por prospecto
    const ultimaLlamada={};
    (llActivas||[]).forEach(l=>{if(!ultimaLlamada[l.prospecto_id])ultimaLlamada[l.prospecto_id]=l.resultado;});
    // Contar por campaña y resultado
    Object.entries(ultimaLlamada).forEach(([pid,res])=>{
      const cid=prosTocamp[pid];if(!cid)return;
      if(!avancePorCampana[cid])avancePorCampana[cid]={};

    {k:'No contestó',    color:'#8BA0B8', bg:'rgba(139,160,184,0.12)'},

    {k:'Registrado al taller', color:'#00A99D', bg:'rgba(0,169,157,0.12)'},

    {k:'No le interesa', color:'#E84040', bg:'rgba(232,64,64,0.10)'},
    {k:'Compró el taller 24/7',color:'#00A99D',bg:'rgba(0,169,157,0.15)'},
  ];

  mc.innerHTML=`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
    <div>
      <div style="font-size:18px;font-weight:600;color:var(--text);">Campañas de telemarketing</div>
      <div style="font-size:12px;color:var(--text3);">Solo una campaña puede estar activa a la vez. Joshua solo ve los prospectos de la campaña activa.</div>
    </div>
    <button onclick="mostrarFormCampana()"
      style="background:var(--teal);color:#fff;border:none;border-radius:var(--radsm);padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;">
      ➕ Nueva campaña
    </button>
  </div>

  <div id="formCampanaCont"></div>

  <div class="card">
    <table class="daily" style="font-size:12px;">
      <thead><tr><th>Nombre</th><th>Periodo</th><th>Prospectos</th><th>Estado</th><th>Acciones</th></tr></thead>
      <tbody>
        ${cs.length===0?`<tr><td colspan="5" style="text-align:center;color:var(--text3);padding:20px;">Sin campañas creadas todavía</td></tr>`:''}
        ${cs.map(c=>{
          const avance=avancePorCampana[c.id]||null;
          const total=conteoPorCampana[c.id]||0;
          const contactados=avance?Object.values(avance).reduce((s,n)=>s+n,0):0;
          const pct=total>0?Math.round(contactados/total*100):0;
          const avanceHtml=c.activa&&total>0?`

              <td colspan="5" style="padding:0 0 14px 0;border-top:none;">
                <div style="padding:10px 14px;background:rgba(0,169,157,0.04);border-top:1px solid var(--border);">

async function crearCampana(){
  const nombre=document.getElementById('nuevaCampNombre')?.value.trim();
  const inicio=document.getElementById('nuevaCampInicio')?.value||null;
  const fin=document.getElementById('nuevaCampFin')?.value||null;
  const desc=document.getElementById('nuevaCampDesc')?.value.trim()||null;
  const msg=document.getElementById('campMsg');
  if(!nombre){msg.style.color='var(--red)';msg.textContent='El nombre es obligatorio';return;}
  const {data,error}=await sb.from('campanas').insert({
    nombre,fecha_inicio:inicio,fecha_fin:fin,descripcion:desc,activa:false,creado_por:currentUser.id
  }).select().single();
  if(error){msg.style.color='var(--red)';msg.textContent='Error: '+error.message;return;}
  document.getElementById('formCampanaCont').innerHTML='';
  abrirCampana(data.id);

async function guardarCampana(campanaId){
  const nombre=document.getElementById('editCampNombre')?.value.trim();
  const inicio=document.getElementById('editCampInicio')?.value||null;
  const fin=document.getElementById('editCampFin')?.value||null;
  const desc=document.getElementById('editCampDesc')?.value.trim()||null;
  const msg=document.getElementById('campEditMsg');
  if(!nombre){if(msg){msg.style.color='var(--red)';msg.textContent='El nombre no puede quedar vacío';}return;}
  const {error}=await sb.from('campanas').update({
    nombre,fecha_inicio:inicio,fecha_fin:fin,descripcion:desc,updated_at:new Date().toISOString()
  }).eq('id',campanaId);
  if(error){if(msg){msg.style.color='var(--red)';msg.textContent='Error: '+error.message;}return;}
  if(msg){msg.style.color='var(--green)';msg.textContent='✓ Guardado';}
}

async function toggleCampanaActiva(id,activar){
  if(activar){
    // Solo una campaña activa a la vez: desactivar todas las demás primero
    const {error:errOff}=await sb.from('campanas').update({activa:false}).neq('id',id);
    if(errOff){alert('Error al desactivar otras campañas: '+errOff.message);return;}
  }
  const {error}=await sb.from('campanas').update({activa:activar,updated_at:new Date().toISOString()}).eq('id',id);
  if(error){alert('Error al cambiar el estado de la campaña: '+error.message);return;}
  // Si estamos dentro del detalle de esta campaña, refrescar ahí; si no, refrescar la lista
  if(document.getElementById('editCampNombre')) abrirCampana(id);
  else renderDirectorCampanas();
}

  setTimeout(()=>msgEl.remove(),3000);

async function subirProspectos(){
  const parsed=window._parsedProspectos||[];
  const users=window._teleUsers||[];
  if(!parsed.length||!users.length) return;

  // Check duplicates by phone/email
  const {data:existing}=await sb.from('prospectos').select('telefono,email');
  const existTels=new Set((existing||[]).map(p=>p.telefono).filter(Boolean));
  const existEmails=new Set((existing||[]).map(p=>p.email).filter(Boolean));

  const nuevos=parsed.filter(p=>{
    const dupTel=p.telefono&&existTels.has(p.telefono);
    const dupEmail=p.email&&existEmails.has(p.email);
    return !dupTel&&!dupEmail;
  });
  const duplicados=parsed.length-nuevos.length;

  const hoy=new Date();
  const toInsert=nuevos.map((p,i)=>({
    ...p,
    asignado_a:users[i%users.length].id,
    estatus:'Nuevo',
    anio:hoy.getFullYear(),
    mes:hoy.getMonth()+1,
  }));

  if(!toInsert.length){
    alert('Todos los prospectos ya existen en la base de datos (duplicados por teléfono/email).');
    return;
  }

  const btn=document.querySelector('button[onclick="subirProspectos()"]');
  if(btn){btn.disabled=true;btn.textContent='Subiendo...';}

  const {error}=await sb.from('prospectos').insert(toInsert);
  if(error){
    alert('Error al subir: '+error.message);
    if(btn){btn.disabled=false;btn.textContent='✅ Confirmar y subir';}
  } else {
    alert(`✅ ${toInsert.length} prospectos subidos correctamente.${duplicados>0?' '+duplicados+' duplicados omitidos.':''}`);
    swD('crm');
    renderDirectorCRM();
  }
}

function buildPromoVistaHtml(bySeccion){
  const today=todayLocal();
  function vig(p){
    if(!p||!p.descuento)return'';
    if(p.permanente)return'<span style="font-size:10px;background:rgba(39,174,96,0.12);color:#27AE60;padding:1px 7px;border-radius:10px;font-weight:600;">Permanente</span>';
    if(p.fecha_inicio&&p.fecha_fin){
      const ok=today>=p.fecha_inicio&&today<=p.fecha_fin;
      return`<span style="font-size:10px;color:${ok?'#27AE60':'var(--text3)'};">${fmtFecha(p.fecha_inicio)} al ${fmtFecha(p.fecha_fin)}</span>`;
    }
    return'';
  }
  function pctCell(p,color){
    if(!p||!p.descuento)return`<td style="text-align:center;font-size:12px;color:var(--text3);">—</td>`;
    return`<td style="text-align:center;font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:${color};">${p.descuento}%</td>`;
  }
  function singleRow(seccion,label,color){
    const p=bySeccion[seccion];
    if(!p||!p.descuento)return'';
    return`<tr style="border-bottom:1px solid var(--border);">
      <td style="padding:8px 12px;font-size:12px;font-weight:500;color:var(--text);">${label}</td>
      <td style="text-align:center;font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:${color};padding:8px 12px;">${p.descuento}%</td>
      <td style="padding:8px 12px;">${vig(p)}</td>
    </tr>`;
  }
  const thStyle='padding:6px 12px;font-size:11px;font-weight:500;color:var(--text3);text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;';
  const thCStyle='padding:6px 12px;font-size:11px;font-weight:500;color:var(--text3);text-align:center;border-bottom:1px solid var(--border);white-space:nowrap;';
  const headStyle=(_bg,accentColor,label)=>`<div style="padding:9px 14px;background:var(--bg,#fff);border-radius:6px 6px 0 0;font-size:12px;font-weight:600;color:${accentColor};border:1px solid var(--border);border-bottom:none;">${label}</div>`;
  const tableWrap=(inner)=>`<table style="width:100%;border-collapse:collapse;border:1px solid var(--border);border-radius:0 0 6px 6px;overflow:hidden;background:var(--bg,#fff);">${inner}</table>`;

  // ── Aspel ──
  const aspelRows=[
    singleRow('aspel_timbres','Timbres y licencias nuevas','#185FA5'),
    singleRow('aspel_actualizacion','Licencias de actualización','#185FA5')
  ].filter(Boolean).join('');
  const aspelHtml=aspelRows?`<div style="margin-bottom:16px;">
    ${headStyle('#E6F1FB','#0C447C','Sistemas Aspel')}
    ${tableWrap(`<thead><tr><th style="${thStyle}">Producto</th><th style="${thCStyle}">Descuento</th><th style="${thStyle}">Vigencia</th></tr></thead><tbody>${aspelRows}</tbody>`)}
  </div>`:'' ;

  // ── Pólizas (tabla cruzada póliza × categoría) ──
  const polizas=['emp','pro','emp2','inf','eli'];
  const polizaNom={emp:'Emprendedor',pro:'Profesionista',emp2:'Mi Empresa',inf:'Infinito',eli:'Elite'};
  const cats=[['nuevas','Nuevas'],['renov','Renovaciones'],['recup','Recuperación']];
  const polizaRows=polizas.map(k=>{
    const cells=cats.map(([cat])=>pctCell(bySeccion[`polizas_${cat}_${k}`],'#1D9E75')).join('');
    const hasData=cats.some(([cat])=>bySeccion[`polizas_${cat}_${k}`]?.descuento>0);
    if(!hasData)return'';
    return`<tr style="border-bottom:1px solid var(--border);">
      <td style="padding:8px 12px;font-size:12px;font-weight:500;color:var(--text);">${polizaNom[k]}</td>
      ${cells}
    </tr>`;
  }).filter(Boolean).join('');

  // Vigencias para las categorías de pólizas (una nota al pie)
  const vigNotas=cats.map(([cat,lbl])=>{
    const sample=polizas.map(k=>bySeccion[`polizas_${cat}_${k}`]).find(p=>p?.descuento>0);
    if(!sample)return'';
    return`${lbl}: ${vig(sample)}`;
  }).filter(Boolean).join(' · ');

  const polizasHtml=polizaRows?`<div style="margin-bottom:16px;">
    ${headStyle('#E1F5EE','#0F6E56','Pólizas de soporte')}
    ${tableWrap(`<thead><tr>
      <th style="${thStyle}">Póliza</th>
      ${cats.map(([,lbl])=>`<th style="${thCStyle}">${lbl}</th>`).join('')}
    </tr></thead><tbody>${polizaRows}</tbody>`)}
    ${vigNotas?`<div style="font-size:10px;color:var(--text3);padding:5px 12px;border:1px solid var(--border);border-top:none;border-radius:0 0 6px 6px;">${vigNotas}</div>`:''}
  </div>`:'';

  // ── Cursos y Resguardo en grid 2 cols ──
  const cursosRows=[
    singleRow('cursos_linea','En línea','#BA7517'),
    singleRow('cursos_sitio','En sitio','#BA7517')
  ].filter(Boolean).join('');
  const cursosHtml=cursosRows?`<div>
    ${headStyle('#FAEEDA','#633806','Cursos')}
    ${tableWrap(`<thead><tr><th style="${thStyle}">Modalidad</th><th style="${thCStyle}">Descuento</th><th style="${thStyle}">Vigencia</th></tr></thead><tbody>${cursosRows}</tbody>`)}
  </div>`:'' ;

  const resRows=[
    singleRow('resguardo_in1','In 1','#A32D2D'),
    singleRow('resguardo_in2','In 2','#A32D2D'),
    singleRow('resguardo_in3','In 3','#A32D2D')
  ].filter(Boolean).join('');
  const resHtml=resRows?`<div style="margin-top:${cursosHtml?'16px':'0'};">
    ${headStyle('#FCEBEB','#791F1F','Pólizas de resguardo')}
    ${tableWrap(`<thead><tr><th style="${thStyle}">Póliza</th><th style="${thCStyle}">Descuento</th><th style="${thStyle}">Vigencia</th></tr></thead><tbody>${resRows}</tbody>`)}
  </div>`:'' ;

  const rightCol=(cursosHtml||resHtml)?`<div>${cursosHtml}${resHtml}</div>`:'' ;

  return aspelHtml
    + polizasHtml
    + (rightCol?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">${rightCol}</div>`:'');
}

async function guardarPromo(seccion,itemLabel){
  const rowId='pr_'+seccion;
  const pct=parseFloat(document.getElementById(rowId+'_pct')?.value)||0;
  const perm=document.getElementById(rowId+'_perm')?.checked||false;
  const ini=document.getElementById(rowId+'_ini')?.value||null;
  const fin=document.getElementById(rowId+'_fin')?.value||null;
  const nota=document.getElementById(rowId+'_nota')?.value.trim()||null;
  const btn=document.querySelector(`[onclick="guardarPromo('${seccion}','${itemLabel.replace(/'/g,"\\'")}')"]`);

  const payload={
    anio:currentYear,mes:currentMonth,
    seccion,item:itemLabel,
    descuento:pct,permanente:perm,
    fecha_inicio:perm?null:ini,
    fecha_fin:perm?null:fin,
    activo:true,notas:nota,
    updated_at:new Date().toISOString()
  };

  // Buscar si ya existe registro para este mes/seccion
  const existing=(window._promoData||[]).find(p=>p.seccion===seccion);
  let error;
  if(existing){
    ({error}=await sb.from('promociones_config').update(payload).eq('id',existing.id));
  } else {
    ({error}=await sb.from('promociones_config').insert(payload));
  }

  if(error){alert('Error: '+error.message);return;}
  if(btn){btn.textContent='✓ Guardado';btn.style.background='#27AE60';}

  const {data:fresh}=await sb.from('promociones_config').select('*').eq('anio',currentYear).eq('mes',currentMonth);
  window._promoData=fresh||[];
  setTimeout(()=>{if(btn){btn.textContent='Guardar';btn.style.background='var(--teal)';}},2000);
}

// Calcular fecha de pago quincenal (adelantar si cae en finde)
function fechaPagoQuincenal(anio, mes, quincena){
  let d;
  if(quincena===1){
    d=new Date(anio,mes-1,15);
  } else {
    d=new Date(anio,mes,0); // último día del mes
  }
  const dow=d.getDay();
  if(dow===6) d.setDate(d.getDate()-1);
  if(dow===0) d.setDate(d.getDate()-2);
  return d.toISOString().slice(0,10);
}

  // Build pago maps: empId_quincena -> pago

  (pagos||[]).forEach(p=>{pagoMap[p.empleado_id+'_'+p.quincena]=p;});
  const incMap={};

async function togglePagadoQ(empId,quincena,pagoId,neto,base,descs){
  const emp=(window._nominaEmps||[]).find(e=>e.id===empId);
  const incs=(window._nominaIncs||[]).filter(i=>i.empleado_id===empId&&i.quincena===quincena);
  const desc=incs.filter(i=>i.monto>0).reduce((s,i)=>s+(i.monto||0),0);
  const bono=incs.filter(i=>i.monto<0).reduce((s,i)=>s+Math.abs(i.monto||0),0);
  const sub=(emp?.quincenal_bruto||0)-desc+bono;
  let total_neto=sub;
  if(emp?.tipo_pago==='honorarios'){
    total_neto=Math.round((sub+sub*0.16-sub*0.1067-sub*0.10)*100)/100;
  }
  // factura_tercero → agrupado en un solo movimiento por quincena
  // imss y honorarios → individuales
  const esGrupo=emp?.tipo_pago==='factura_tercero';
  const EGRESO_CONCEPTO=esGrupo
    ?`Nómina Factura Tercero · ${quincena}ª quincena`
    :`Nómina ${emp?.nombre||''} · ${quincena}ª quincena`;

  if(pagoId){
    const p=window._nominaPagos.find(p=>p.id===pagoId);
    const ahora_pagado=!(p?.pagado);
    await sb.from('nomina_pagos').update({
      pagado:ahora_pagado,
      total_neto,
      fecha_pago:ahora_pagado?new Date().toISOString().slice(0,10):null,
      updated_at:new Date().toISOString()
    }).eq('id',pagoId);
    // Egreso automático
    if(esGrupo){
      // factura_tercero: recalcular suma de todos los pagados de ese tipo en la quincena
      const {data:pagosFT}=await sb.from('nomina_pagos')
        .select('total_neto,empleado_id').eq('anio',currentYear).eq('mes',currentMonth)
        .eq('quincena',quincena).eq('pagado',true);
      const empsFT=(window._nominaEmps||[]).filter(e=>e.tipo_pago==='factura_tercero').map(e=>e.id);
      // Si estamos desmarcando, excluir el actual
      let sumaFT=(pagosFT||[]).filter(p=>empsFT.includes(p.empleado_id)&&p.empleado_id!==empId)
        .reduce((s,p)=>s+(p.total_neto||0),0);
      if(ahora_pagado) sumaFT+=total_neto;
      // Borrar y recrear el egreso grupal
      await sb.from('egresos').delete().eq('anio',currentYear).eq('mes',currentMonth)
        .eq('concepto',EGRESO_CONCEPTO);
      if(sumaFT>0){
        await sb.from('egresos').insert({
          anio:currentYear,mes:currentMonth,categoria:'fijo',subcategoria:'nomina',
          concepto:EGRESO_CONCEPTO,monto:Math.round(sumaFT*100)/100,
          tiene_factura:false,fecha:new Date().toISOString().slice(0,10)
        });
      }
    } else {
      // IMSS / honorarios: egreso individual
      await sb.from('egresos').delete().eq('anio',currentYear).eq('mes',currentMonth)
        .eq('concepto',EGRESO_CONCEPTO);
      if(ahora_pagado){
        await sb.from('egresos').insert({
          anio:currentYear,mes:currentMonth,categoria:'fijo',subcategoria:'nomina',
          concepto:EGRESO_CONCEPTO,monto:total_neto,
          tiene_factura:false,fecha:new Date().toISOString().slice(0,10)
        });
      }
    }
  } else {
    // Crear registro de pago nuevo
    const {error}=await sb.from('nomina_pagos').insert({
      empleado_id:empId,anio:currentYear,mes:currentMonth,quincena,
      monto_base:emp?.quincenal_bruto||0,
      incidencias_descuento:desc,incidencias_extra:bono,
      total_neto,pagado:true,
      fecha_pago:new Date().toISOString().slice(0,10),
      updated_at:new Date().toISOString()
    });
    if(error){alert('Error: '+error.message);return;}
    // Egreso automático para nuevo pago
    if(esGrupo){
      const {data:pagosFT}=await sb.from('nomina_pagos')
        .select('total_neto,empleado_id').eq('anio',currentYear).eq('mes',currentMonth)
        .eq('quincena',quincena).eq('pagado',true);
      const empsFT=(window._nominaEmps||[]).filter(e=>e.tipo_pago==='factura_tercero').map(e=>e.id);
      const sumaFT=(pagosFT||[]).filter(p=>empsFT.includes(p.empleado_id))
        .reduce((s,p)=>s+(p.total_neto||0),0)+total_neto;
      await sb.from('egresos').delete().eq('anio',currentYear).eq('mes',currentMonth)
        .eq('concepto',EGRESO_CONCEPTO);
      if(sumaFT>0){
        await sb.from('egresos').insert({
          anio:currentYear,mes:currentMonth,categoria:'fijo',subcategoria:'nomina',
          concepto:EGRESO_CONCEPTO,monto:Math.round(sumaFT*100)/100,
          tiene_factura:false,fecha:new Date().toISOString().slice(0,10)
        });
      }
    } else {
      await sb.from('egresos').delete().eq('anio',currentYear).eq('mes',currentMonth)
        .eq('concepto',EGRESO_CONCEPTO);
      await sb.from('egresos').insert({
        anio:currentYear,mes:currentMonth,categoria:'fijo',subcategoria:'nomina',
        concepto:EGRESO_CONCEPTO,monto:total_neto,
        tiene_factura:false,fecha:new Date().toISOString().slice(0,10)
      });
    }
  }
  renderFinNomina();
}

function selIncTipo(val){
  document.getElementById('incTipo').value=val;
  document.querySelectorAll('#incTipoGrid button').forEach(b=>{
    const active=b.dataset.val===val;
    b.style.borderColor=active?'currentColor':'transparent';
    b.style.boxShadow=active?'0 0 0 1px currentColor':'none';
  });
  // Auto-seleccionar el botón
  const btn=document.querySelector(`#incTipoGrid button[data-val="${val}"]`);
  if(btn) btn.click=null; // already selected via onclick
}

async function guardarIncidencia(empId,quincena){
  const tipo=document.getElementById('incTipo')?.value;
  const desc=document.getElementById('incDesc')?.value.trim()||null;
  const montoRaw=parseFloat(document.getElementById('incMonto')?.value)||0;
  if(!tipo){alert('Selecciona el tipo de incidencia.');return;}
  if(!montoRaw){alert('El monto es obligatorio.');return;}
  // bonos = monto negativo (suman al neto), descuentos = positivo (restan)
  const esBono=tipo==='bono_fijo'||tipo==='bono_variable';
  const monto=esBono?-montoRaw:montoRaw;
  const {error}=await sb.from('nomina_incidencias').insert({
    empleado_id:empId,anio:currentYear,mes:currentMonth,quincena,tipo,descripcion:desc,monto,aplicado:false
  });
  if(error){alert('Error: '+error.message);return;}
  document.getElementById('formIncidencia')?.remove();
  renderFinNomina();
}

async function guardarFichaEmpleado(empId){
  const g=id=>document.getElementById(id)?.value?.trim()||null;
  const gn=id=>parseFloat(document.getElementById(id)?.value)||null;
  const sdi=gn('fi_sdi');
  const qb=gn('fi_qb')||( sdi? Math.round(sdi*15.2*100)/100 : null );
  const payload={
    curp:g('fi_curp'),rfc:g('fi_rfc'),nss:g('fi_nss'),
    fecha_nacimiento:g('fi_fnac')||null,
    telefono:g('fi_tel'),contacto_emergencia:g('fi_emer'),
    puesto:g('fi_puesto'),area:g('fi_area'),
    fecha_ingreso:g('fi_fing')||null,fecha_egreso:g('fi_feg')||null,
    activo:!g('fi_feg'),
    sdi,quincenal_bruto:qb,
    aguinaldo:gn('fi_agui')||0,
    banco:g('fi_banco'),clabe:g('fi_clabe'),
    updated_at:new Date().toISOString()
  };
  const {error}=await sb.from('nomina_empleados').update(payload).eq('id',empId);
  if(error){alert('Error: '+error.message);return;}
  document.getElementById('fichaModal')?.remove();
  renderFinNomina();
}

function updateEgSubcats(){
  const cat=document.getElementById('egCat')?.value||'fijo';
  const sel=document.getElementById('egSubcat');
  if(!sel)return;
  sel.innerHTML=EGRESO_CATS[cat].map(s=>`<option>${s}</option>`).join('');
}

async function guardarEgreso(){
  const cat=document.getElementById('egCat')?.value;
  const sub=document.getElementById('egSubcat')?.value;
  const concepto=document.getElementById('egConcepto')?.value.trim();
  const prov=document.getElementById('egProv')?.value.trim()||null;
  const monto=parseFloat(document.getElementById('egMonto')?.value)||0;
  const fecha=document.getElementById('egFecha')?.value||null;
  const folio=document.getElementById('egFolio')?.value.trim()||null;
  const notas=document.getElementById('egNotas')?.value.trim()||null;
  if(!concepto||!monto){alert('Concepto y monto son obligatorios.');return;}
  const {error}=await sb.from('egresos').insert({
    anio:currentYear,mes:currentMonth,categoria:cat,subcategoria:sub,
    concepto,proveedor:prov,monto,tiene_factura:!!folio,folio_factura:folio,fecha,notas
  });
  if(error){alert('Error: '+error.message);return;}
  document.getElementById('formEgreso')?.remove();
  renderFinEgresos();
}

async function eliminarEgreso(id){
  if(!confirm('¿Eliminar este egreso?'))return;
  await sb.from('egresos').delete().eq('id',id);
  renderFinEgresos();
}

let currentAdminTab='ingresos';
function renderFinAdmin(){
  const c=finCont();
  const ATABS=[{id:'ingresos',l:'Ingresos facturados'},{id:'gb',l:'Guillermo Blancas'},{id:'egresos_fact',l:'Egresos con factura'},{id:'rubros',l:'📊 Rubros'},{id:'rubros_config',l:'⚙️ Config. rubros'}];

  </div>
  <div id="adminContent"></div>`;

function swAdmin(id){
  currentAdminTab=id;
  [{id:'ingresos',l:'Ingresos facturados'},{id:'gb',l:'Guillermo Blancas'},{id:'egresos_fact',l:'Egresos con factura'},{id:'rubros',l:'📊 Rubros'},{id:'rubros_config',l:'⚙️ Config. rubros'}].forEach(t=>{
    const b=document.getElementById('atab_'+t.id);
    if(!b)return;
    b.style.borderBottomColor=t.id===id?'var(--navy)':'transparent';
    b.style.fontWeight=t.id===id?'600':'400';
    b.style.color=t.id===id?'var(--navy)':'var(--text2)';
  });
  dispatchAdminTab(id);
}

function dispatchAdminTab(id){
  if(id==='ingresos')         renderAdminIngresos();
  else if(id==='gb')          renderAdminGB();
  else if(id==='rubros')      renderAdminRubros();
  else if(id==='rubros_config') renderAdminRubrosConfig();
  else                        renderAdminEgresos();
}

async function agregarRubro(tipo){
  const inp=document.getElementById('newRubro_'+tipo);
  const nombre=(inp?.value||'').trim().toUpperCase();
  if(!nombre)return;
  const orden=(tipo==='ingreso'?(window._rubrosIng||[]).length:(window._rubrosEg||[]).length)+1;
  const {error}=await sb.from('rubros_config').insert({tipo,nombre,orden,activo:true});
  if(error){alert('Error: '+error.message);return;}
  await cargarRubros();
  renderAdminRubrosConfig();
}

async function eliminarRubro(id){
  if(!confirm('¿Eliminar este rubro?'))return;
  await sb.from('rubros_config').update({activo:false}).eq('id',id);
  await cargarRubros();
  renderAdminRubrosConfig();
}
