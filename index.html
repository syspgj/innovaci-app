<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Innovaci — Vendedores</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#0D2240;--teal:#00A99D;--teal-bg:rgba(0,169,157,0.1);--teal-b:rgba(0,169,157,0.25);
  --gold:#F5A623;--gold-bg:rgba(245,166,35,0.1);--gold-b:rgba(245,166,35,0.25);
  --red:#E84040;--red-bg:rgba(232,64,64,0.08);--green:#27AE60;--green-bg:rgba(39,174,96,0.1);
  --bg:#EEF2F7;--surface:#fff;--surf2:#F7FAFC;
  --text:#0D2240;--text2:#4A6080;--text3:#8BA0B8;
  --border:rgba(13,34,64,0.08);--rad:14px;--radsm:9px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── LOGIN ── */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rad);padding:40px;width:100%;max-width:380px;}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:32px;}
.login-logo .lm{width:36px;height:36px;background:var(--teal);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;}
.login-logo span{font-size:16px;font-weight:600;color:var(--navy);}
.login-title{font-size:22px;font-weight:700;color:var(--navy);margin-bottom:6px;}
.login-sub{font-size:13px;color:var(--text3);margin-bottom:28px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px;}
.field input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radsm);font-size:14px;font-family:'Inter',sans-serif;color:var(--text);background:var(--surf2);outline:none;transition:border 0.15s;}
.field input:focus{border-color:var(--teal);background:#fff;}
.btn-primary{width:100%;padding:11px;background:var(--teal);border:none;border-radius:var(--radsm);color:#fff;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:opacity 0.15s;}
.btn-primary:hover{opacity:0.88;}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;}
.login-err{font-size:12px;color:var(--red);margin-top:10px;text-align:center;min-height:18px;}

/* ── TOPBAR ── */
#appScreen{display:none;}
.topbar{background:var(--navy);height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:200;}
.tb-left{display:flex;align-items:center;gap:12px;}
.logo{width:30px;height:30px;background:var(--teal);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;}
.tb-left h1{color:#fff;font-size:14px;font-weight:500;}
.tb-div{width:1px;height:18px;background:rgba(255,255,255,0.15);}
.tb-lbl{font-size:12px;color:rgba(255,255,255,0.4);}
.tb-right{display:flex;align-items:center;gap:10px;}
.user-chip{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:4px 12px 4px 5px;}
.uav{width:24px;height:24px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;}
.user-chip span{color:rgba(255,255,255,0.85);font-size:12px;font-weight:500;}
.btn-logout{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:6px;color:rgba(255,255,255,0.6);font-size:11px;padding:5px 10px;cursor:pointer;font-family:'Inter',sans-serif;}
.btn-logout:hover{background:rgba(255,255,255,0.15);}
.msel{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:7px;color:#fff;font-size:12px;padding:5px 10px;font-family:'Inter',sans-serif;cursor:pointer;}
.msel option{background:#0D2240;color:#fff;}

/* ── TABS ── */
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);padding:0 24px;overflow-x:auto;}
.tab{padding:12px 16px;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;}
.cartera-subtab{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:7px 16px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;color:var(--text2);}
.cartera-subtab.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.cartera-th-sort{cursor:pointer;user-select:none;white-space:nowrap;}
.cartera-th-sort:hover{color:var(--teal);}
.tab.active{color:var(--teal);border-bottom-color:var(--teal);}

/* ── MAIN ── */
.main{max-width:1100px;margin:0 auto;padding:20px 16px 60px;}.main.full-width{max-width:100%;padding:20px 24px 60px;}
.tc{display:none;} .tc.active{display:block;}

/* ── HERO COMISIÓN ── */
.hero{background:var(--navy);border-radius:var(--rad);padding:24px 28px;margin-bottom:18px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;right:-40px;top:-40px;width:200px;height:200px;background:radial-gradient(circle,rgba(0,169,157,0.2) 0%,transparent 70%);pointer-events:none;}
.hero-lbl{font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--teal);margin-bottom:8px;}
.hero-grid{display:grid;grid-template-columns:1fr auto;gap:20px;align-items:center;}
.comm-num{font-family:'JetBrains Mono',monospace;font-size:48px;font-weight:600;color:#fff;letter-spacing:-2px;line-height:1;}
.comm-sub{font-size:12px;color:rgba(255,255,255,0.4);margin-top:5px;}
.comm-sub b{color:rgba(255,255,255,0.7);}
.rate-chip{display:inline-block;background:var(--teal-bg);border:1px solid var(--teal-b);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--teal);font-weight:600;margin-top:8px;}
.ring-wrap{position:relative;width:78px;height:78px;flex-shrink:0;}
.ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-pct{font-size:15px;font-weight:700;color:#fff;font-family:'JetBrains Mono',monospace;line-height:1;}
.ring-sub{font-size:9px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.05em;margin-top:1px;}

/* ── PROGRESS STRIP ── */
.prog-strip{background:var(--surface);border:1px solid var(--border);border-radius:var(--rad);padding:14px 20px;margin-bottom:18px;display:flex;align-items:center;gap:16px;}
.prog-lbl{font-size:12px;font-weight:500;color:var(--text);min-width:80px;}
.prog-outer{flex:1;height:9px;background:var(--bg);border-radius:5px;overflow:hidden;}
.prog-fill{height:100%;border-radius:5px;transition:width 0.9s ease;}
.prog-meta{font-size:12px;color:var(--text2);text-align:right;min-width:110px;}
.prog-meta strong{display:block;font-size:14px;color:var(--text);}

/* ── CHART ── */
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rad);padding:16px 20px;margin-bottom:18px;}
.chart-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.chart-title{font-size:13px;font-weight:600;color:var(--text);}
.cleg{display:flex;gap:14px;font-size:11px;color:var(--text2);}
.cleg span{display:flex;align-items:center;gap:5px;}
.lsq{width:8px;height:8px;border-radius:2px;}

/* ── KPI GRID ── */
.shead{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin:16px 0 10px;}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.kc{background:var(--surface);border:1px solid var(--border);border-radius:var(--rad);padding:14px 16px;position:relative;overflow:hidden;}
.kc-acc{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:12px 0 0 12px;}
.kc-name{font-size:11px;color:var(--text2);font-weight:500;margin-bottom:5px;padding-left:2px;}
.kc-nums{display:flex;align-items:baseline;gap:4px;margin-bottom:7px;}
.kc-cur{font-size:24px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:-0.5px;line-height:1;}
.kc-sep{color:var(--text3);font-size:13px;}
.kc-meta{font-size:13px;color:var(--text3);font-family:'JetBrains Mono',monospace;}
.kc-bar{height:4px;background:var(--bg);border-radius:2px;overflow:hidden;margin-bottom:5px;}
.kc-barf{height:100%;border-radius:2px;}
.kc-foot{display:flex;justify-content:space-between;align-items:center;font-size:11px;}

/* ── SEC KPIS ── */
.sec-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:18px;}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radsm);padding:10px 12px;text-align:center;}
.sc-icon{font-size:16px;margin-bottom:4px;}
.sc-val{font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1;margin-bottom:2px;}
.sc-name{font-size:10px;color:var(--text3);font-weight:500;}
.sc-sub{font-size:10px;margin-top:3px;}

/* ── BADGE ── */
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;}
.bg{background:var(--green-bg);color:var(--green);}
.bo{background:var(--gold-bg);color:var(--gold);}
.br{background:var(--red-bg);color:var(--red);}
.bt{background:var(--teal-bg);color:var(--teal);}

/* ── BOTTOM GRID ── */
.bottom-grid{display:grid;grid-template-columns:1fr 320px;gap:14px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rad);overflow:hidden;}
.card-head{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:13px;font-weight:600;}

/* ── DAILY TABLE ── */
table.daily{width:100%;border-collapse:collapse;font-size:12px;}
table.daily thead th{padding:7px 12px;text-align:left;font-size:10px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;color:var(--text3);background:var(--surf2);border-bottom:1px solid var(--border);}
table.daily tbody tr{border-bottom:1px solid var(--border);}
table.daily tbody tr:last-child{border-bottom:none;}
table.daily tbody tr:hover{background:var(--surf2);}
table.daily td{padding:8px 12px;vertical-align:middle;}
.today-row td{background:var(--teal-bg)!important;}
.today-row td:first-child{border-left:3px solid var(--teal);}

/* ── RIGHT PANEL ── */
.right-panel{display:flex;flex-direction:column;gap:12px;}
.proj-card{background:var(--navy);border-radius:var(--rad);padding:18px;}
.proj-title{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:12px;}
.proj-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.06);font-size:12px;}
.proj-row:last-child{border-bottom:none;}
.proj-rl{color:rgba(255,255,255,0.45);}
.proj-rv{font-family:'JetBrains Mono',monospace;font-weight:600;color:#fff;}
.proj-rv.teal{color:var(--teal);}
.proj-rv.gold{color:var(--gold);}
.days-box{background:var(--gold-bg);border:1px solid var(--gold-b);border-radius:var(--radsm);padding:12px 14px;margin-bottom:10px;}
.days-num{font-size:30px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--gold);line-height:1;}
.days-lbl{font-size:11px;color:var(--text2);margin-top:2px;}
.need-row{display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px solid var(--border);color:var(--text2);}
.need-row:last-child{border-bottom:none;}
.need-row strong{color:var(--text);font-family:'JetBrains Mono',monospace;}

/* ── REGISTRO FORM ── */
.reg-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--rad);padding:20px;}
.form-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.fg3{grid-template-columns:repeat(3,1fr);}
.form-field{display:flex;flex-direction:column;gap:5px;}
.form-field label{font-size:11px;font-weight:500;color:var(--text2);}
.form-field input{padding:9px 12px;border:1px solid var(--border);border-radius:var(--radsm);font-size:13px;font-family:'JetBrains Mono',monospace;color:var(--text);background:var(--surf2);outline:none;transition:border 0.15s;}
.form-field input:focus{border-color:var(--teal);background:#fff;}
.form-field .prefix{position:relative;}
.form-field .prefix input{padding-left:24px;}
.form-field .prefix::before{content:'$';position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text3);pointer-events:none;}
.form-actions{display:flex;gap:10px;margin-top:16px;}
.btn-save{flex:1;padding:10px;background:var(--teal);border:none;border-radius:var(--radsm);color:#fff;font-size:13px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;}
.btn-save:hover{opacity:0.88;}
.btn-save:disabled{opacity:0.5;cursor:not-allowed;}
.save-msg{font-size:12px;color:var(--green);margin-top:8px;min-height:16px;}

/* ── SIM ── */
.sim-card{background:var(--surface);border:2px dashed var(--border);border-radius:var(--rad);padding:18px;}
.sim-title{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--teal);margin-bottom:12px;}
.sim-result{background:var(--teal-bg);border:1px solid var(--teal-b);border-radius:var(--radsm);padding:10px 14px;margin-top:10px;display:flex;justify-content:space-between;align-items:center;}
.sim-rlbl{font-size:11px;color:var(--text2);}
.sim-rval{font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--teal);}

/* ── LOADING ── */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text3);font-size:13px;gap:10px;}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── DIRECTOR VIEWS ── */
.th4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
.thc{background:var(--surface);border:1px solid var(--border);border-radius:var(--rad);padding:14px 18px;}
.th-lbl{font-size:10px;font-weight:600;letter-spacing:0.09em;text-transform:uppercase;color:var(--text3);margin-bottom:5px;}
.th-val{font-size:26px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:-1px;line-height:1;color:var(--text);}
.th-sub{font-size:11px;color:var(--text3);margin-top:3px;}
.vgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:18px;}
.vc{background:var(--surface);border:1px solid var(--border);border-radius:var(--rad);overflow:hidden;}
.vc-top{padding:16px 18px 12px;border-bottom:1px solid var(--border);}
.vc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.vc-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
.vc-name{font-size:13px;font-weight:600;color:var(--text);}
.vc-role{font-size:11px;color:var(--text3);}
.vc-cr{text-align:right;}
.vc-clbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;}
.vc-cval{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1.1;}
.vc-crate{font-size:10px;margin-top:1px;}
.vbr{display:flex;align-items:center;gap:8px;font-size:11px;margin-bottom:7px;}
.vbrn{width:80px;color:var(--text2);flex-shrink:0;}
.vbo{flex:1;height:6px;background:var(--bg);border-radius:3px;overflow:hidden;}
.vbf{height:100%;border-radius:3px;}
.vbp{width:32px;text-align:right;font-weight:600;font-family:'JetBrains Mono',monospace;font-size:11px;}
.vc-bot{padding:10px 18px;background:var(--surf2);display:flex;gap:6px;flex-wrap:wrap;}
.pill{display:flex;align-items:center;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:3px 9px;font-size:11px;color:var(--text2);}
.pill .pd{width:5px;height:5px;border-radius:50%;}
.pill .pv{font-weight:600;color:var(--text);font-family:'JetBrains Mono',monospace;}
.goal-strip{background:var(--navy);border-radius:var(--rad);padding:16px 22px;margin-bottom:18px;display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:center;}
.gs-val{font-size:32px;font-weight:700;font-family:'JetBrains Mono',monospace;color:#fff;letter-spacing:-1px;line-height:1;}
.gs-lbl{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:5px;}
.gs-sub{font-size:12px;color:rgba(255,255,255,0.4);margin-top:3px;}
.gs-sub b{color:rgba(255,255,255,0.7);}
.gs-row{display:flex;align-items:center;gap:8px;font-size:11px;margin-bottom:6px;}
.gs-rn{width:68px;color:rgba(255,255,255,0.4);flex-shrink:0;}
.gs-bo{flex:1;height:5px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;}
.gs-bf{height:100%;border-radius:3px;}
.gs-rp{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:rgba(255,255,255,0.65);min-width:32px;text-align:right;}
.crow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;}
.cc{background:var(--surface);border:1px solid var(--border);border-radius:var(--rad);padding:16px 18px;}
.insight{background:var(--teal-bg);border:1px solid var(--teal-b);border-radius:var(--radsm);padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--text2);line-height:1.6;}
.insight strong{color:var(--teal);}

@media(max-width:760px){
  .kpi-grid,.sec-grid,.th4,.vgrid,.crow,.bottom-grid,.form-grid,.fg3{grid-template-columns:1fr 1fr;}
  .sec-grid{grid-template-columns:repeat(3,1fr);}
  .bottom-grid{grid-template-columns:1fr;}
  .goal-strip{grid-template-columns:1fr;}
  .comm-num{font-size:36px;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <div class="lm">IN</div>
      <span>Grupo Innovaci</span>
    </div>
    <div class="login-title">Bienvenido</div>
    <div class="login-sub">Accede con tu correo institucional</div>
    <div class="field">
      <label>Correo</label>
      <input type="email" id="loginEmail" placeholder="tu@innovaci.com.mx" autocomplete="email">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-primary" id="btnLogin" onclick="doLogin()">Entrar</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- APP -->
<div id="appScreen">
  <nav class="topbar">
    <div class="tb-left">
      <div class="logo">IN</div>
      <h1>Grupo Innovaci</h1>
      <div class="tb-div"></div>
      <span class="tb-lbl" id="viewLabel">—</span>
    </div>
    <div class="tb-right">
      <div id="reportBtns" style="display:none;gap:6px;"></div>
      <select class="msel" id="monthSel" onchange="setMonth(this.value)" style="display:none;"></select>
      <div class="user-chip">
        <div class="uav" id="userAv">—</div>
        <span id="userName">—</span>
      </div>
      <button class="btn-logout" onclick="doLogout()">Salir</button>
    </div>
  </nav>
  <div class="tabs" id="tabsBar"></div>
  <div class="main" id="mainContent">
    <div class="loading"><div class="spinner"></div> Cargando...</div>
  </div>
</div>

<script>

function isMireya(u){return u&&u.email&&u.email.toLowerCase().includes('mireya');}
function getRate(v,m,u){
  // CONDICIÓN DOBLE: depto debe llegar a meta Y vendedor debe cumplir su meta individual
  if(!deptoAlcanzado) return 0; // Depto no cumplió → $0 para todos
  if(v<m) return 0; // Vendedor no cumplió su meta individual → $0
  const tbl=isMireya(u)?CT_MIREYA:CT;
  const p=v/m;
  for(const t of tbl)if(p>=t.min&&p<=t.max)return t.r;
  return 0;
}
function getRateDisplay(v,m,u){
  // Para mostrar la tasa potencial si se cumplen las condiciones
  const tbl=isMireya(u)?CT_MIREYA:CT;
  const p=v/m;
  for(const t of tbl)if(p>=t.min&&p<=t.max)return t.r;
  return 0;
}
function getComm(v,m,u){return v*getRate(v,m,u);}
// Aplica un ajuste manual de comisión (si existe) sobre el cálculo automático.
// ajuste: {tipo_ajuste:'porcentaje'|'monto_fijo', valor:number, motivo:string} | null
// Retorna {comisionFinal, tasaFinal, tieneAjuste, motivo}
function aplicarAjusteComision(comisionBase, tasaBase, ventas, ajuste){
  if(!ajuste) return {comisionFinal:comisionBase, tasaFinal:tasaBase, tieneAjuste:false, motivo:null};
  if(ajuste.tipo_ajuste==='monto_fijo'){
    return {comisionFinal:ajuste.valor, tasaFinal:ventas>0?ajuste.valor/ventas:0, tieneAjuste:true, motivo:ajuste.motivo};
  }
  // porcentaje: se suma a la tasa final ya calculada (incluye bono KPI), luego se recalcula sobre ventas
  const tasaAjustada=tasaBase+(ajuste.valor/100);
  return {comisionFinal:ventas*tasaAjustada, tasaFinal:tasaAjustada, tieneAjuste:true, motivo:ajuste.motivo};
}

// ─── BONOS ADICIONALES (reglas de negocio Innovaci) ──────────────────────────
// 1) Bono Siigo Fiscal: $450 por cada Siigo Fiscal.
//    - Junio 2026: se entrega DIRECTO a todos (sin condición de depto).
//    - Julio 2026+: solo si el depto alcanzó ≥80% de su meta general.
const BONO_SF_UNITARIO=450;
function calcBonoSiigoFiscal(cantidadSf, anio, mes, deptoPct){
  const cant=cantidadSf||0;
  if(cant<=0) return {monto:0, aplica:false, motivo:'Sin Siigo Fiscal vendidos'};
  // Junio 2026 = directo
  const esJunio2026=(anio===2026&&mes===6);
  if(esJunio2026) return {monto:cant*BONO_SF_UNITARIO, aplica:true, motivo:`${cant} × $${BONO_SF_UNITARIO} (junio: directo)`};
  // Julio+ : requiere depto ≥80%
  if(deptoPct>=0.8) return {monto:cant*BONO_SF_UNITARIO, aplica:true, motivo:`${cant} × $${BONO_SF_UNITARIO} (depto ≥80%)`};
  return {monto:0, aplica:false, motivo:`Depto <80% (${Math.round(deptoPct*100)}%) — bono SF retenido`};
}

// 2) Comisión de la mediocridad: 2% sobre servicios.
//    Aplica cuando el DEPTO no llegó al 100% PERO el vendedor SÍ cumplió su meta individual.
const TASA_MEDIOCRIDAD=0.02;
function calcComisionMediocridad(svcVendido, svcMeta, deptoAlcanzo){
  if(deptoAlcanzo) return {monto:0, aplica:false, motivo:'Depto cumplió — aplica comisión normal'};
  if(svcVendido<svcMeta) return {monto:0, aplica:false, motivo:'Vendedor no llegó a su meta individual'};
  return {monto:svcVendido*TASA_MEDIOCRIDAD, aplica:true, motivo:`2% sobre ${fmt(svcVendido)} (meta individual cumplida)`};
}

// 3) Bono trimestral: 0.5% sobre la SUMA de servicios de los 3 meses del trimestre,
//    SOLO si el vendedor cumplió 100% de su meta individual en los 3 meses.
const TASA_TRIMESTRAL=0.005;
function trimestreDeMes(mes){return Math.ceil(mes/3);} // 1-3→1, 4-6→2, etc.
function mesesDeTrimestre(trim){const base=(trim-1)*3;return [base+1,base+2,base+3];}
function calcBonoTrimestral(svcPorMes, metaPorMes){
  // svcPorMes/metaPorMes: {mes: valor} para los 3 meses del trimestre
  const meses=Object.keys(svcPorMes);
  if(meses.length<3) return {monto:0, aplica:false, motivo:'Trimestre incompleto', cumplidos:0};
  let cumplidos=0, sumaSvc=0;
  meses.forEach(m=>{
    sumaSvc+=svcPorMes[m]||0;
    if((svcPorMes[m]||0)>=(metaPorMes[m]||Infinity)) cumplidos++;
  });
  if(cumplidos<3) return {monto:0, aplica:false, motivo:`Solo cumplió ${cumplidos}/3 meses al 100%`, cumplidos, sumaSvc};
  return {monto:sumaSvc*TASA_TRIMESTRAL, aplica:true, motivo:`0.5% sobre ${fmt(sumaSvc)} (3/3 meses cumplidos)`, cumplidos, sumaSvc};
}

// Tabla % extra por alcance de bono KPIs
const BONO_KPI_TABLE=[
  {min:0,   max:0.7999, extra:-0.01},
  {min:0.8, max:0.9499, extra:0},
  {min:0.95,max:0.9999, extra:0.005},
  {min:1.0, max:1.0999, extra:0.01},
  {min:1.1, max:1.1999, extra:0.02},
  {min:1.2, max:99,     extra:0.04},
];
function getBonoKpiExtra(alcance){
  for(const t of BONO_KPI_TABLE) if(alcance>=t.min&&alcance<=t.max) return t.extra;
  return 0;
}
function calcAlcanceBono(kpiCfg, tot, metaKey, esMireya){
  // Solo KPIs con peso > 0 para bono. Filtrar filas _m (Mireya) vs normales según corresponda,
  // para no duplicar el peso ponderado sumando KPIs de ambos universos a la vez.
  let totalPeso=0, ponderado=0;
  const totMap=buildTotMap(tot);
  const kpisAplicables=kpiCfg.filter(k=>esMireya?/_m$/.test(k.kpi_key):!/_m$/.test(k.kpi_key));
  for(const k of kpisAplicables){
    if(!k.peso||k.peso===0) continue;
    const meta=k[metaKey]||1;
    const actual=totMap[k.kpi_key]||0;
    const alcance=Math.min(actual/meta,1.5); // cap at 150%
    ponderado+=alcance*(k.peso/100);
    totalPeso+=k.peso/100;
  }
  if(totalPeso===0) return 0;
  return ponderado/totalPeso;
}
function buildTotMap(tot){
  return {
    svc:tot.svc,svc_m:tot.svc,
    aspel:tot.aspel,aspel_m:tot.aspel,
    it:tot.it,
    cursos:tot.cursos,cur:tot.cursos,cur247:tot.cursos,cur_m:tot.cursos,
    sf:tot.sf,sf_m:tot.sf,siigo_fiscal:tot.sf,
    demos:tot.demos,demos_m:tot.demos,
    val:tot.val,val_m:tot.val,
    cn:tot.cn,cn_m:tot.cn,
    dip:tot.dip,dip_m:tot.dip,
    sus:tot.sus,suscripciones:tot.sus,renovaciones:tot.ren!=null?tot.ren:tot.sus,
    cur_vivo:tot.cur_vivo,
  };
}

// ─── INIT APP ────────────────────────────────────────────────────────────────
async function initApp(user){
  currentUser=user;
  // Cargar perfil — intentar con select normal
  let prof=null;
  try {
    const res=await sb.from('usuarios').select('*').eq('id',user.id).maybeSingle();
    prof=res.data;
  } catch(e){ prof=null; }
  // Si no existe, construir perfil desde el email sin tocar la DB
  if(!prof){
    const esDirector=user.email.includes('jp')||user.email.includes('josue')||user.email.includes('joss')||user.email.includes('director');
    const nombreRaw=user.email.split('@')[0];
    const nombre=nombreRaw.charAt(0).toUpperCase()+nombreRaw.slice(1);
    // Intentar insertar solo si no existe — ignorar error de conflicto
    try {
      await sb.from('usuarios').insert({id:user.id,email:user.email,nombre,rol:esDirector?'director':'vendedor'});
    } catch(e){}
    // Re-intentar leer
    try {
      const res2=await sb.from('usuarios').select('*').eq('id',user.id).maybeSingle();
      prof=res2.data;
    } catch(e){}
    // Si aún falla, construir perfil local sin DB
    if(!prof){
      prof={id:user.id,email:user.email,nombre,rol:esDirector?'director':'vendedor',activo:true};
    }
  }
  userProfile=prof;
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appScreen').style.display='block';
  document.getElementById('userName').textContent=userProfile.nombre;
  document.getElementById('userAv').textContent=userProfile.nombre.substring(0,2).toUpperCase();
  document.getElementById('viewLabel').textContent=userProfile.rol==='director'?'Vista Director':userProfile.rol==='telemarketing'?'Telemarketing':userProfile.rol==='administracion'?'Administración':'Mi Mes';
  // Month selector
  const msel=document.getElementById('monthSel');
  msel.style.display='block';
  const meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  msel.innerHTML=meses.map((m,i)=>`<option value="${i+1}" ${i+1===currentMonth?'selected':''}>${m} ${currentYear}</option>`).join('');
  // Build UI by role
  if(userProfile.rol==='director') buildDirectorUI();
  else if(userProfile.rol==='telemarketing') buildTeleUI();
  else if(userProfile.rol==='administracion') buildAdminUI();
  else buildVendorUI();
}

  ${tasaCierreReal!==null&&pipeAbiertoList.length>0?`
  <div style="background:var(--surface-2,#f8f9fa);border:1px solid var(--border);border-radius:var(--radsm);padding:12px 16px;margin-bottom:16px;font-size:12px;color:var(--text2);line-height:1.7;">

    ${proyeccionDeclarada>proyeccionAjustada?`Estás siendo <strong>optimista</strong> por ${fmt(Math.round(proyeccionDeclarada-proyeccionAjustada))}.`:proyeccionDeclarada<proyeccionAjustada?`Estás siendo <strong>conservador</strong> — podrías cerrar ${fmt(Math.round(proyeccionAjustada-proyeccionDeclarada))} más de lo que proyectas.`:''}
  </div>`:''}
  <div class="bottom-grid">
    <div class="card">
      <div class="card-head"><span class="card-title">Actividad del mes</span><span class="badge bt">${registros.length} días registrados</span></div>
      <table class="daily"><thead><tr><th>Fecha</th><th>Servicios</th><th>Aspel</th><th>Cursos</th><th>Clientes</th></tr></thead>
      <tbody id="dailyBody"></tbody></table>
    </div>
    <div class="right-panel">
      <div class="proj-card">
        <div class="proj-title">Proyección de cierre</div>
        <div class="proj-row"><span class="proj-rl">Días restantes</span><span class="proj-rv">${diasRest}</span></div>
        <div class="proj-row"><span class="proj-rl">Acumulado</span><span class="proj-rv teal">${fmt(tot.svc)}</span></div>
        <div class="proj-row"><span class="proj-rl">Falta para meta</span><span class="proj-rv gold">${Math.max(svcMeta-tot.svc,0)>0?fmt(svcMeta-tot.svc):'✓ Lograda'}</span></div>
        <div class="proj-row"><span class="proj-rl">Proyección fin de mes</span><span class="proj-rv" id="projFin">—</span></div>
        <div class="proj-row"><span class="proj-rl">Comisión proyectada</span><span class="proj-rv teal" id="projComm">—</span></div>
      </div>
      <div class="card" style="padding:14px 16px;">
        <div style="font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;">Para llegar a meta</div>
        <div class="days-box"><div class="days-num">${diasRest}</div><div class="days-lbl">días hábiles restantes</div></div>
        <div class="need-row"><span>Necesitas por día (svc)</span><strong id="perDaySvc">—</strong></div>
        <div class="need-row"><span>Demos pendientes</span><strong style="color:var(--red);" id="demosPend">—</strong></div>
      </div>
      <div class="sim-card">
        <div class="sim-title">¿Y si vendo más?</div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
          <input type="range" id="simSlider" min="40000" max="200000" step="1000" value="${Math.max(tot.svc,80000)}" style="flex:1;accent-color:var(--teal);" oninput="updSim(this.value,${svcMeta})">
          <span style="font-size:12px;font-weight:600;font-family:'JetBrains Mono',monospace;color:var(--text);min-width:44px;" id="simVal">—</span>
        </div>
        <div class="sim-result">
          <div><div class="sim-rlbl">Comisión estimada</div><div style="font-size:10px;color:var(--text3);" id="simRate">—</div></div>
          <div class="sim-rval" id="simComm">—</div>
        </div>
      </div>
    </div>
  </div>`;
  // Ring chart
  if(ringChart)ringChart.destroy();
  const rCtx=document.getElementById('ringC').getContext('2d');
  const rp=Math.min(svcPct,2);
  ringChart=new Chart(rCtx,{type:'doughnut',data:{datasets:[{data:[rp,Math.max(0,2-rp)],backgroundColor:[ringColor,'rgba(255,255,255,0.08)'],borderWidth:0,cutout:'74%'}]},options:{responsive:false,plugins:{legend:{display:false},tooltip:{enabled:false}},animation:{duration:800}}});
  // Trend chart
  if(trendChart)trendChart.destroy();
  const tCtx=document.getElementById('trendC').getContext('2d');
  const idealPD=svcMeta/diasHabiles;
  const acum=[];let run=0;
  for(const r of registros){run+=r.svc||0;acum.push(Math.round(run));}
  const idealArr=Array.from({length:diasHabiles},(_,i)=>Math.round(idealPD*(i+1)));
  const acumPad=[...acum,...Array(Math.max(0,diasHabiles-acum.length)).fill(null)];
  const lbls=Array.from({length:diasHabiles},(_,i)=>'D'+(i+1));

  // ── PROYECCIÓN DE CIERRE: extiende el ritmo real actual hasta fin de mes ──
  const diasConDato=acum.length;
  const ventaActual=acum.length?acum[acum.length-1]:0;
  const ritmoDiarioReal=diasConDato>0?ventaActual/diasConDato:0;
  const cierreProyectado=Math.round(ritmoDiarioReal*diasHabiles);
  // Array de proyección: continúa desde el último punto real con el ritmo actual
  let proyArr=Array(diasHabiles).fill(null);
  if(esEsteMes&&diasConDato>0&&diasConDato<diasHabiles){
    proyArr[diasConDato-1]=ventaActual; // ancla en el último real
    for(let i=diasConDato;i<diasHabiles;i++){
      proyArr[i]=Math.round(ritmoDiarioReal*(i+1));
    }
  }

  trendChart=new Chart(tCtx,{type:'line',data:{labels:lbls,datasets:[
    {label:'Real',data:acumPad,borderColor:'#00A99D',backgroundColor:'rgba(0,169,157,0.08)',fill:true,borderWidth:2,pointRadius:2,tension:0.3,spanGaps:false},
    {label:'Proyección',data:proyArr,borderColor:'#F5A623',borderDash:[3,3],borderWidth:2,pointRadius:0,fill:false,spanGaps:true},
    {label:'Ideal',data:idealArr,borderColor:'rgba(0,0,0,0.2)',borderDash:[5,4],borderWidth:1.5,pointRadius:0,fill:false},
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.dataset.label+': '+fmt(c.parsed.y)}}},scales:{x:{ticks:{color:'#8BA0B8',font:{size:10},maxTicksLimit:11},grid:{display:false}},y:{ticks:{color:'#8BA0B8',font:{size:10},callback:v=>fmtK(v)},grid:{color:'rgba(13,34,64,0.05)'}}}}});

  // Tarjeta de cierre proyectado (solo si es el mes en curso y hay datos)
  const proyEl=document.getElementById('cierreProyectado');
  if(proyEl){
    if(esEsteMes&&diasConDato>0){
      const pctProy=svcMeta>0?Math.round(cierreProyectado/svcMeta*100):0;
      const alcanza=cierreProyectado>=svcMeta;
      const colorProy=alcanza?'#27AE60':pctProy>=85?'#F5A623':'#E84040';
      const faltante=svcMeta-cierreProyectado;
      proyEl.innerHTML=`
        <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;">
          <div style="flex:1;min-width:180px;">
            <div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px;">📈 Proyección de cierre — ${getNombreMes(currentMonth)}</div>
            <div style="font-size:22px;font-weight:800;color:${colorProy};">${fmt(cierreProyectado)}</div>
            <div style="font-size:11px;color:var(--text3);margin-top:2px;">
              A tu ritmo actual (${fmt(Math.round(ritmoDiarioReal))}/día × ${diasHabiles} días hábiles)
            </div>
          </div>
          <div style="text-align:right;">
            <div style="font-size:26px;font-weight:800;color:${colorProy};">${pctProy}%</div>
            <div style="font-size:11px;font-weight:600;color:${colorProy};">
              ${alcanza?'✅ Vas a superar la meta':`▼ Faltarían ${fmt(faltante)}`}
            </div>
          </div>
        </div>
        ${!alcanza&&diasRest>0?`<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:11px;color:var(--text2);">
          💡 Para alcanzar la meta necesitas <strong style="color:var(--navy);">${fmt(Math.round(faltante/diasRest))}/día</strong> en los ${diasRest} días restantes (vs ${fmt(Math.round(ritmoDiarioReal))}/día actual)
        </div>`:''}`;
    } else {
      proyEl.innerHTML='';
    }
  }
  // Main KPIs — excluir filas con sufijo _m (configuración histórica de Mireya) si el
  // vendedor actual no es Mireya, para que Dulce/Manuel no vean sus tarjetas mezcladas.
  const esMireyaActual=isMireya(userProfile);
  const mainK=kpiConfig.filter(k=>k.categoria==='principal'&&(esMireyaActual?/_m$/.test(k.kpi_key):!/_m$/.test(k.kpi_key)));
  const totMap=buildTotMap(tot);
  document.getElementById('mainKpis').innerHTML=mainK.map(k=>{
    const v=totMap[k.kpi_key]||0,m=metas[k.kpi_key]?.m||1,p=Math.min(v/m,1),c=pcol(p),pp=Math.round(p*100);
    const vf=k.tipo==='$'?fmt(v):v,mf=k.tipo==='$'?fmtK(m):m;
    return `<div class="kc"><div class="kc-acc" style="background:${c};"></div>
      <div class="kc-name">${k.kpi_nombre}</div>
      <div class="kc-nums"><span class="kc-cur" style="color:${c};">${k.tipo==='$'?fmtK(v):v}</span><span class="kc-sep">/</span><span class="kc-meta">${mf}</span></div>
      <div class="kc-bar"><div class="kc-barf" style="width:${pp}%;background:${c};"></div></div>
      <div class="kc-foot">${pbadge(p)}<span style="font-weight:600;font-size:11px;color:${c};">${pp}%</span></div>
    </div>`;
  }).join('');
  // Sec KPIs — mismo filtro: excluir filas _m de Mireya si el vendedor actual no es ella
  const secK=kpiConfig.filter(k=>k.categoria!=='principal'&&(esMireyaActual?/_m$/.test(k.kpi_key):!/_m$/.test(k.kpi_key)));
  const icons={demos:'🎯',val:'📋',cursos:'🎓',sf:'💼',cn:'👤',it:'💻',sus:'🔄',dip:'🏛️'};
  document.getElementById('secKpis').innerHTML=secK.map(k=>{
    const v=totMap[k.kpi_key]||0,m=metas[k.kpi_key]?.m||1,p=v/m,c=pcol(Math.min(p,1));
    const cls=v>=m?'bg':v===0?'br':'bo';
    return `<div class="sc"><div class="sc-icon">${icons[k.kpi_key]||'📌'}</div><div class="sc-val" style="color:${c};">${k.tipo==='$'?fmtK(v):v}</div><div class="sc-name">${k.kpi_nombre}</div><div class="sc-sub"><span class="badge ${cls}">${Math.round(Math.min(p,1)*100)}%</span></div></div>`;
  }).join('');
  // Daily table
  const today=todayLocal();
  document.getElementById('dailyBody').innerHTML=registros.length?registros.map(r=>{
    const isT=r.fecha===today;
    return `<tr class="${isT?'today-row':''}"><td style="color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:11px;">${r.fecha.slice(5)}${isT?' 🔵':''}</td>
      <td style="font-family:'JetBrains Mono',monospace;font-weight:500;color:${(r.svc||0)>0?'#00A99D':'var(--text3)'};">${(r.svc||0)>0?fmt(r.svc):'—'}</td>
      <td style="font-family:'JetBrains Mono',monospace;">${(r.aspel||0)>0?fmt(r.aspel):'—'}</td>
      <td style="color:var(--text2);">${(r.cursos||0)>0?r.cursos:'—'}</td>
      <td>${(r.clientes_nuevos||0)>0?`<span class="badge bt">+${r.clientes_nuevos}</span>`:'—'}</td>
    </tr>`;
  }).join(''):'<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--text3);font-size:12px;">Sin registros este mes — usa "Registrar día"</td></tr>';
  // Projection
  const avgPD=diasTrans>0?tot.svc/diasTrans:0;
  const projFin=tot.svc+avgPD*diasRest;
  const projComm=getComm(projFin,svcMeta,userProfile);
  document.getElementById('projFin').textContent=fmt(projFin);
  document.getElementById('projComm').textContent=fmt(projComm);
  const gap=Math.max(svcMeta-tot.svc,0);
  document.getElementById('perDaySvc').textContent=diasRest>0&&gap>0?fmt(gap/diasRest):'✓';
  const dm=metas.demos?.m||3,dv=tot.demos;
  document.getElementById('demosPend').textContent=Math.max(dm-dv,0)>0?Math.max(dm-dv,0)+' demos':'✓';
  // Simulator
  updSim(Math.max(tot.svc,80000),svcMeta);
}

function updSim(v,meta){
  v=parseInt(v);
  const r=getRate(v,meta),c=v*r;
  const el=document.getElementById('simVal');
  const rc=document.getElementById('simComm');
  const rr=document.getElementById('simRate');
  if(el)el.textContent=fmtK(v);
  if(rc)rc.textContent=fmt(c);
  if(rr)rr.textContent='tasa '+(r*100).toFixed(1)+'%';
}

  const esDiaPasado=fecha!==today;
  // Log de edición si modifica un día pasado o registro existente
  let notasLog='';
  if(esEdicion||esDiaPasado){
    const ahora=new Date();
    const hora=ahora.getHours()+':'+String(ahora.getMinutes()).padStart(2,'0');
    notasLog=`✏️ Editado el ${fmtFecha(today)} a las ${hora}`;
  }
  const payload={
    usuario_id:currentUser.id,fecha,

    it:Math.round(parseFloat(document.getElementById('fIt').value)||0),

    monto_cotizaciones:Math.round(parseFloat(document.getElementById('fCotMonto').value)||0),

    clientes_nuevos:parseInt(document.getElementById('fCn').value)||0,
    demos:parseInt(document.getElementById('fDemos').value)||0,
    valoraciones:parseInt(document.getElementById('fVal').value)||0,
    cursos:parseInt(document.getElementById('fCur').value)||0,
    siigo_fiscal:parseInt(document.getElementById('fSf').value)||0,
    talleres_vivo:Math.round(parseFloat(document.getElementById('fTalVivo').value)||0),
    llamadas_seguimiento:parseInt(document.getElementById('fLlamSeg').value)||0,
    llamadas_prospeccion:parseInt(document.getElementById('fLlamPros').value)||0,
    neg_clientes_num:parseInt(document.getElementById('fNegCliNum').value)||0,
    neg_clientes_monto:Math.round(parseFloat(document.getElementById('fNegCliMonto').value)||0),
    neg_prospectos_num:parseInt(document.getElementById('fNegProsNum').value)||0,

    updated_at:new Date().toISOString(),
  };
  if(notasLog) payload.notas=notasLog;
  const {error}=await sb.from('registros_diarios').upsert(payload,{onConflict:'usuario_id,fecha'});

}

async function renderProyeccion(){
  const mc=document.getElementById('mainContent');
  mc.innerHTML='<div class="loading"><div class="spinner"></div> Cargando proyección...</div>';

  // Calcular mes anterior
  const mesAnt=currentMonth===1?12:currentMonth-1;
  const anioAnt=currentMonth===1?currentYear-1:currentYear;

  // Cargar oportunidades del mes actual
  const {data:rows}=await sb.from('pipeline_vendedor')
    .select('*').eq('usuario_id',currentUser.id)
    .eq('anio',currentYear).eq('mes',currentMonth);
  window._pipeRows=rows||[];

  // Buscar negociaciones abiertas del mes anterior
  const {data:abiertas}=await sb.from('pipeline_vendedor')
    .select('*').eq('usuario_id',currentUser.id)
    .eq('anio',anioAnt).eq('mes',mesAnt)
    .eq('estatus','Negociando');

  // Solo mostrar oferta si hay abiertas y NO ya existen en el mes actual (comparar por cliente+producto)
  const yaExisten=new Set((rows||[]).map(r=>`${r.cliente||''}|${r.producto||''}`));
  const pendientes=(abiertas||[]).filter(r=>!yaExisten.has(`${r.cliente||''}|${r.producto||''}`));

  window._pipeAbiertasMesAnt=pendientes;
  renderProyeccionTabla();

  // Mostrar banner si hay pendientes de traspasar
  if(pendientes.length>0){
    setTimeout(()=>mostrarBannerTraspaso(pendientes,mesAnt,anioAnt),100);
  }
}

        ✅ Traspasar a ${getNombreMes(currentMonth)}
      </button>

        No por ahora
      </button>
    </div>`;

}

async function confirmarTraspaso(){
  const pendientes=window._pipeAbiertasMesAnt||[];
  if(!pendientes.length) return;
  const btn=document.querySelector('#bannerTraspaso button');
  if(btn){btn.disabled=true;btn.textContent='Traspasando...';}
  let ok=0,err=0;
  const nuevaFecha=`${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(new Date(currentYear,currentMonth,0).getDate()).padStart(2,'0')}`;
  for(const r of pendientes){
    const mesAntNombre=getNombreMes(currentMonth===1?12:currentMonth-1);
    const {error}=await sb.from('pipeline_vendedor').insert({
      usuario_id:currentUser.id,
      anio:currentYear,
      mes:currentMonth,
      tipo_servicio:r.tipo_servicio||'',
      producto:r.producto||'',
      cliente:r.cliente||'',
      monto_total:r.monto_total||0,
      subtotal:r.subtotal||0,
      probabilidad:r.probabilidad||50,
      fecha_prevista:nuevaFecha,
      estatus:'Negociando',
      objecion:(r.objecion?r.objecion+' | ':'')+'📋 Traspasado de '+mesAntNombre,
      updated_at:new Date().toISOString(),
    });
    if(error){console.error('Error traspaso:',error.message);err++;}
    else ok++;
  }
  document.getElementById('bannerTraspaso')?.remove();
  if(err>0) alert(`⚠️ ${ok} traspasados, ${err} con error.`);
  const {data:rows}=await sb.from('pipeline_vendedor')
    .select('*').eq('usuario_id',currentUser.id)
    .eq('anio',currentYear).eq('mes',currentMonth);
  window._pipeRows=rows||[];
  window._pipeAbiertasMesAnt=[];
  renderProyeccionTabla();
}

function renderProyeccionTabla(){
  const mc=document.getElementById('mainContent');
  if(!mc) return;
  let pipe=window._pipeRows||[];
  // Filtros
  if(pipeFiltroEstatus) pipe=pipe.filter(r=>r.estatus===pipeFiltroEstatus);
  if(pipeFiltroTexto){const q=pipeFiltroTexto.toLowerCase();pipe=pipe.filter(r=>(r.producto||'').toLowerCase().includes(q)||(r.cliente||'').toLowerCase().includes(q)||(r.tipo_servicio||'').toLowerCase().includes(q));}
  // Ordenamiento
  pipe=[...pipe].sort((a,b)=>{
    let va=a[pipeSortCol]||'', vb=b[pipeSortCol]||'';
    if(!isNaN(va)&&!isNaN(vb)){va=Number(va);vb=Number(vb);}
    return va<vb?-pipeSortDir:va>vb?pipeSortDir:0;
  });
  const totalMonto=pipe.reduce((s,r)=>s+(r.monto_total||0),0);
  const totalSubtotal=pipe.reduce((s,r)=>s+(r.subtotal||0),0);
  const flecha=(col)=>pipeSortCol===col?(pipeSortDir===1?' ▲':' ▼'):'';
  const thS=(lbl,col,extra='')=>`<th onclick="pipeSort('${col}')" style="padding:8px 10px;text-align:${extra||'left'};white-space:nowrap;cursor:pointer;user-select:none;" title="Ordenar">${lbl}${flecha(col)}</th>`;
  const estatusOpciones=['Negociando','Ganado','Perdido','Pospuesto'];

  mc.innerHTML=`
  <div style="margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
    <div>
      <div style="font-size:16px;font-weight:700;color:var(--text);">Proyección de Ventas — ${getNombreMes(currentMonth)} ${currentYear}</div>
      <div style="font-size:12px;color:var(--text3);margin-top:2px;">${pipe.length} negociaciones · Total: ${fmt(totalMonto)} · Subtotal: ${fmt(totalSubtotal)}</div>
    </div>
    <button onclick="agregarFilaPipe()" style="background:var(--teal);color:#fff;border:none;border-radius:var(--radsm);padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;">+ Agregar</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center;">
    <div style="position:relative;flex:1;min-width:160px;">
      <input type="text" id="pipeBuscar" placeholder="Buscar por cliente, servicio..." value="${pipeFiltroTexto}" oninput="pipeFiltroTexto=this.value;renderProyeccionTabla()"
        style="width:100%;padding:7px 30px 7px 10px;border:1px solid var(--border);border-radius:var(--radsm);font-size:12px;box-sizing:border-box;">
      ${pipeFiltroTexto?`<button onclick="pipeFiltroTexto='';renderProyeccionTabla()" style="position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;">✕</button>`:''}
    </div>
    <select onchange="pipeFiltroEstatus=this.value;renderProyeccionTabla()" style="padding:7px 10px;border:1px solid var(--border);border-radius:var(--radsm);font-size:12px;font-family:'Inter',sans-serif;">
      <option value="">Todos los estatus</option>
      ${estatusOpciones.map(e=>`<option value="${e}" ${pipeFiltroEstatus===e?'selected':''}>${e}</option>`).join('')}
    </select>
    ${(pipeFiltroEstatus||pipeFiltroTexto)?`<button onclick="pipeFiltroEstatus='';pipeFiltroTexto='';renderProyeccionTabla()" style="background:none;border:1px solid var(--border);border-radius:var(--radsm);padding:6px 12px;font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;">✕ Limpiar</button>`:''}
  </div>
  <div style="overflow-x:auto;">
  <table style="width:100%;border-collapse:collapse;font-size:12px;">
    <thead>
      <tr style="background:var(--navy);color:#fff;">
        ${thS('Tipo','tipo_servicio')}${thS('Servicio / Póliza','producto')}${thS('Cliente','cliente')}
        ${thS('Monto Total','monto_total','right')}${thS('Subtotal','subtotal','right')}
        ${thS('Prob.','probabilidad','center')}${thS('Fecha prev.','fecha_prevista','center')}
        ${thS('Estatus','estatus','center')}
        <th style="padding:8px 10px;text-align:left;white-space:nowrap;">Objeción / Nota</th>
        <th style="padding:8px 10px;"></th>
      </tr>
    </thead>
    <tbody id="pipeBody">
      ${pipe.map(r=>filaPipe(r)).join('')}
      ${pipe.length===0?`<tr><td colspan="10" style="text-align:center;padding:24px;color:var(--text3);">${window._pipeRows.length?'Ningún resultado coincide con los filtros.':'Sin negociaciones este mes — agrega una con el botón de arriba'}</td></tr>`:''}
    </tbody>
    <tfoot>
      <tr style="background:var(--surface-2,#f4f6f8);font-weight:700;">
        <td colspan="3" style="padding:8px 10px;color:var(--text);">TOTAL</td>
        <td style="padding:8px 10px;text-align:right;color:var(--navy);">${fmt(totalMonto)}</td>
        <td style="padding:8px 10px;text-align:right;color:var(--teal);">${fmt(totalSubtotal)}</td>
        <td colspan="5"></td>
      </tr>
    </tfoot>
  </table>
  </div>`;
}

function pipeSort(col){
  if(pipeSortCol===col) pipeSortDir*=-1;
  else{pipeSortCol=col;pipeSortDir=1;}
  renderProyeccionTabla();
}

function filaPipe(r){
  const probColor=r.probabilidad>=90?'#27AE60':r.probabilidad>=70?'#00A99D':r.probabilidad>=50?'#F5A623':'#E84040';
  const estColor=r.estatus==='Ganado'?'#27AE60':r.estatus==='Perdido'?'#E84040':r.estatus==='Pospuesto'?'#888':'#F5A623';
  return `<tr id="pr_${r.id}" style="border-bottom:1px solid var(--border);">
    <td style="padding:7px 10px;">${r.tipo_servicio||'—'}</td>
    <td style="padding:7px 10px;font-weight:500;">${r.producto||'—'}</td>
    <td style="padding:7px 10px;">${r.cliente||'—'}</td>
    <td style="padding:7px 10px;text-align:right;font-weight:600;color:var(--navy);">${fmt(r.monto_total||0)}</td>
    <td style="padding:7px 10px;text-align:right;color:var(--teal);">${fmt(r.subtotal||0)}</td>
    <td style="padding:7px 10px;text-align:center;"><span style="font-weight:700;color:${probColor};">${r.probabilidad||0}%</span></td>
    <td style="padding:7px 10px;text-align:center;color:var(--text3);">${r.fecha_prevista||'—'}</td>
    <td style="padding:7px 10px;text-align:center;"><span style="font-size:11px;font-weight:600;color:${estColor};">${r.estatus||'Negociando'}</span></td>
    <td style="padding:7px 10px;color:var(--text3);font-size:11px;max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${r.objecion||''}</td>
    <td style="padding:7px 10px;text-align:center;">
      <button onclick="editarFilaPipe('${r.id}')" style="background:none;border:1px solid var(--border);border-radius:var(--radsm);padding:3px 8px;font-size:11px;cursor:pointer;color:var(--text2);">✏️</button>
      <button onclick="eliminarFilaPipe('${r.id}')" style="background:none;border:1px solid rgba(232,64,64,0.3);border-radius:var(--radsm);padding:3px 8px;font-size:11px;cursor:pointer;color:var(--red);margin-left:4px;">✕</button>
    </td>
  </tr>`;
}

function agregarFilaPipe(){
  const hoy=todayLocal();
  const modal=document.createElement('div');
  modal.id='modalPipe';
  modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;';
  modal.innerHTML=modalPipeHTML(null,hoy);
  document.body.appendChild(modal);
  modal.addEventListener('click',e=>{if(e.target===modal)modal.remove();});
}

async function editarFilaPipe(id){
  const {data:r}=await sb.from('pipeline_vendedor').select('*').eq('id',id).single();
  if(!r) return;
  const modal=document.createElement('div');
  modal.id='modalPipe';
  modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;';
  modal.innerHTML=modalPipeHTML(r,r.fecha_prevista||new Date().toISOString().split('T')[0]);
  document.body.appendChild(modal);
  modal.addEventListener('click',e=>{if(e.target===modal)modal.remove();});
}

async function guardarFilaPipe(){
  const id=document.getElementById('pipeId').value;
  const payload={
    usuario_id:currentUser.id,
    anio:currentYear, mes:currentMonth,
    tipo_servicio:document.getElementById('pTipo').value,
    producto:document.getElementById('pProducto').value,
    cliente:document.getElementById('pCliente').value,
    monto_total:parseFloat(document.getElementById('pMonto').value)||0,
    subtotal:parseFloat(document.getElementById('pSubtotal').value)||0,
    probabilidad:parseInt(document.getElementById('pProb').value)||50,
    fecha_prevista:document.getElementById('pFecha').value,
    estatus:document.getElementById('pEstatus').value,
    objecion:document.getElementById('pObjecion').value,
    updated_at:new Date().toISOString(),
  };
  let error;
  if(id){
    ({error}=await sb.from('pipeline_vendedor').update(payload).eq('id',id));
  } else {
    ({error}=await sb.from('pipeline_vendedor').insert(payload));
  }
  if(error){alert('Error: '+error.message);return;}
  document.getElementById('modalPipe')?.remove();
  renderProyeccion();
}

async function eliminarFilaPipe(id){
  if(!confirm('¿Eliminar esta negociación?')) return;
  await sb.from('pipeline_vendedor').delete().eq('id',id);
  renderProyeccion();
}

function swCartera(sub){
  currentCarteraSub=sub;
  ['todos','mia','vencen','resueltas'].forEach(s=>{
    const btn=document.getElementById('carteraSub_'+s);
    if(btn) btn.classList.toggle('active',s===sub);
  });
  const clientes=window._cartClientes||[];
  const hoy=new Date();
  const inicioMes=`${hoy.getFullYear()}-${String(hoy.getMonth()+1).padStart(2,'0')}-01`;
  const finMes=new Date(hoy.getFullYear(),hoy.getMonth()+1,0).toISOString().split('T')[0];
  const q=(carteraFiltroTexto||'').toLowerCase();
  const prod=carteraFiltroProducto||'';

  let filtrados=clientes.filter(cl=>{
    // Filtro de texto
    const matchQ=!q||(cl.razon_social||'').toLowerCase().includes(q)||(cl.rfc||'').toLowerCase().includes(q)||(cl.num_cliente||'').toLowerCase().includes(q);
    // Filtro de producto (al menos una suscripción con ese producto)
    const matchProd=!prod||(cl._suscripciones||[]).some(s=>s.producto===prod);
    if(!matchQ||!matchProd) return false;
    // Filtro por sub-pestaña
    if(sub==='todos') return true;
    if(sub==='mia') return cl.vendedor_asignado===currentUser.id;
    if(sub==='vencen') return cl.vendedor_asignado===currentUser.id&&(cl._suscripciones||[]).some(s=>s.fecha_proxima_renovacion>=inicioMes&&s.fecha_proxima_renovacion<=finMes);
    if(sub==='resueltas') return cl.vendedor_asignado===currentUser.id&&(cl._suscripciones||[]).some(s=>['renovada','no_renovada'].includes(s.estado)&&s.fecha_marcado>=inicioMes);
    return true;
  });

  // Agrupar: principales primero, subcuentas debajo de su padre
  const principales=filtrados.filter(c=>!c.cliente_padre_id);
  const subcuentas=filtrados.filter(c=>!!c.cliente_padre_id);
  const agrupados=[];
  for(const p of principales){
    agrupados.push(p);
    subcuentas.filter(s=>s.cliente_padre_id===p.id).forEach(s=>agrupados.push(s));
  }
  // Subcuentas huérfanas
  const enAgrupados=new Set(agrupados.map(c=>c.id));
  subcuentas.filter(s=>!enAgrupados.has(s.id)).forEach(s=>agrupados.push(s));

  const cont=document.getElementById('carteraContenido');
  if(!cont) return;
  if(!agrupados.length){
    cont.innerHTML=`<div style="text-align:center;padding:50px 20px;color:var(--text3);font-size:13px;">
      ${q||prod?'Ningún cliente coincide con los filtros aplicados.':sub==='mia'?'Aún no tienes clientes asignados.':sub==='vencen'?'No hay renovaciones este mes.':'No hay clientes en la cartera aún.'}
    </div>`;
    return;
  }
  cont.innerHTML=`<div style="display:grid;gap:8px;">${agrupados.map(cl=>fichaClienteCartera(cl,sub)).join('')}</div>`;
}

// Guardar ficha completa: datos del cliente + fechas de suscripciones editadas
async function guardarFichaClienteCompleta(id){
  const msg=document.getElementById('fichaClienteMsg');
  // 1. Guardar datos del cliente
  const payload={
    razon_social:document.getElementById('fcRazon')?.value.trim()||null,
    rfc:document.getElementById('fcRfc')?.value.trim().toUpperCase()||null,
    contacto_principal:document.getElementById('fcContacto')?.value.trim()||null,
    email:document.getElementById('fcEmail')?.value.trim()||null,
    telefono:document.getElementById('fcTel1')?.value.trim()||null,
    telefono2:document.getElementById('fcTel2')?.value.trim()||null,
    escritorio_servicios:document.getElementById('fcEscritorio')?.value.trim()||null,
    link_crm:document.getElementById('fcLinkCrm')?.value.trim()||null,
    vendedor_asignado:document.getElementById('fcVendedor')?.value||null,
    cliente_padre_id:document.getElementById('fcPadreId')?.value||null,
    updated_at:new Date().toISOString()
  };
  if(payload.cliente_padre_id){
    const padre=(window._cartClientes||[]).find(p=>p.id===payload.cliente_padre_id);
    if(padre){
      if(!payload.telefono&&padre.telefono) payload.telefono=padre.telefono;
      if(!payload.email&&padre.email) payload.email=padre.email;
      if(!payload.vendedor_asignado&&padre.vendedor_asignado) payload.vendedor_asignado=padre.vendedor_asignado;
    }
  }
  const {error:errCl}=await sb.from('clientes_cartera').update(payload).eq('id',id);
  if(errCl){msg.textContent='Error: '+errCl.message;return;}

  // 2. Guardar fechas de suscripciones (todas las que tienen data-susc-id)
  const inputs=document.querySelectorAll('[data-susc-id]');
  const suscUpdates={};
  inputs.forEach(inp=>{
    const sId=inp.dataset.suscId;
    const field=inp.dataset.field;
    if(!suscUpdates[sId]) suscUpdates[sId]={};
    let val=inp.tagName==='TEXTAREA'?inp.value:(inp.value||null);
    if(field==='monto') val=parseFloat(inp.value)||0;
    suscUpdates[sId][field]=val;
  });
  const promises=Object.entries(suscUpdates).map(([sId,upd])=>
    sb.from('suscripciones_cartera').update({...upd,updated_at:new Date().toISOString()}).eq('id',sId)
  );
  const results=await Promise.all(promises);
  const errSusc=results.find(r=>r.error);
  if(errSusc){msg.textContent='Error en suscripción: '+errSusc.error.message;return;}

  document.getElementById('modalFichaCliente').remove();
  renderCarteraVendedor();
}

function aplicarFiltrosCartera(lista){
  let r=lista;
  if(carteraFiltroTexto.trim()){
    const q=carteraFiltroTexto.trim().toLowerCase();
    r=r.filter(c=>(c.razon_social||'').toLowerCase().includes(q)||(c.rfc||'').toLowerCase().includes(q)||(c.numserie||'').toLowerCase().includes(q));
  }
  if(carteraFiltroProducto) r=r.filter(c=>c.producto===carteraFiltroProducto);
  if(carteraFiltroPeriodicidad) r=r.filter(c=>c.periodicidad===carteraFiltroPeriodicidad);
  return r;
}

function ordenarCartera(lista,colDefault){
  const col=carteraSortCol||colDefault;
  const dir=carteraSortDir;
  return [...lista].sort((a,b)=>{
    let va=a[col],vb=b[col];
    if(va==null&&vb==null) return 0;
    if(va==null) return 1;
    if(vb==null) return -1;
    if(typeof va==='string') va=va.toLowerCase();
    if(typeof vb==='string') vb=vb.toLowerCase();
    if(va<vb) return -1*dir;
    if(va>vb) return 1*dir;
    return 0;
  });
}

function thSort(label,col,callbackRefresh){
  const activo=carteraSortCol===col;
  const flecha=activo?(carteraSortDir===1?' ▲':' ▼'):'';
  return `<th class="cartera-th-sort" onclick="setCarteraSort('${col}','${callbackRefresh}')">${label}${flecha}</th>`;
}

function setCarteraSort(col,callbackRefresh){
  if(carteraSortCol===col) carteraSortDir*=-1;
  else{carteraSortCol=col;carteraSortDir=1;}
  if(callbackRefresh==='vendedor') swCartera(currentCarteraSub);
  else if(callbackRefresh==='director') renderDirCarteraContenido();
}

async function guardarFechaRenovacion(id){
  const razonSocial=document.getElementById('editRazonSocialInput').value.trim()||null;
  const rfc=document.getElementById('editRfcInput').value.trim().toUpperCase()||null;
  const fechaUltima=document.getElementById('editFechaUltimaInput').value||null;
  const fechaProxima=document.getElementById('editFechaProximaInput').value||null;
  const escritorio=document.getElementById('editEscritorioInput')?.value.trim()||null;
  const cuentaPadreId=document.getElementById('editCuentaPadreId')?.value||null;
  const msg=document.getElementById('fechaRenovMsg');

  // Si se vincula a cuenta padre, heredar teléfono, correo y vendedor
  let herencia={};
  if(cuentaPadreId){
    const padre=(window._carteraTodas||[]).find(p=>p.id===cuentaPadreId);
    if(padre){
      if(padre.telefono) herencia.telefono=padre.telefono;
      if(padre.telefono2) herencia.telefono2=padre.telefono2;
      if(padre.email) herencia.email=padre.email;
      if(padre.vendedor_asignado) herencia.vendedor_asignado=padre.vendedor_asignado;
    }
  }

  const {error}=await sb.from('cuentas_cartera').update({
    razon_social:razonSocial, rfc,
    fecha_ultima_renovacion:fechaUltima,
    fecha_proxima_renovacion:fechaProxima,
    escritorio_servicios:escritorio,
    cuenta_padre_id:cuentaPadreId||null,
    ...herencia,
    updated_at:new Date().toISOString()
  }).eq('id',id);
  if(error){msg.textContent='Error: '+error.message;return;}
  document.getElementById('modalFechaRenovacion').remove();
  // Refrescar cartera completa para que se vea el agrupamiento
  renderCarteraVendedor();
}

function onRenovoChange(){
  const valor=document.querySelector('input[name="renovoRadio"]:checked')?.value;
  document.getElementById('camposRenovoSi').style.display=valor==='si'?'block':'none';
  document.getElementById('camposRenovoNo').style.display=valor==='no'?'block':'none';
}

async function guardarSeguimiento(id){
  const valor=document.querySelector('input[name="renovoRadio"]:checked')?.value;
  const msg=document.getElementById('segMsg');
  if(!valor){msg.textContent='Selecciona si renovó o no';return;}
  let upd={fecha_marcado:new Date().toISOString().split('T')[0],updated_at:new Date().toISOString()};
  if(valor==='si'){
    const fecha=document.getElementById('fechaRenovacionInput').value;
    if(!fecha){msg.textContent='Indica la fecha de renovación';return;}
    upd.estado='renovada';
    upd.fecha_ultima_renovacion=fecha;
    upd.nota_vendedor=document.getElementById('notaRenovoInput').value.trim()||null;
  }else{
    const motivo=document.getElementById('motivoNoRenovoInput').value.trim();
    if(!motivo){msg.textContent='El motivo es obligatorio cuando no renovó';return;}
    upd.estado='no_renovada';
    upd.motivo_no_renovacion=motivo;
  }
  const {error}=await sb.from('suscripciones_cartera').update(upd).eq('id',id);
  if(error){msg.textContent='Error: '+error.message;return;}
  document.getElementById('modalSeguimiento').remove();
  renderCarteraVendedor();
}

async function guardarAltaCuenta(){
  const razon=document.getElementById('altaRazonSocial').value.trim();
  const msg=document.getElementById('altaMsg');
  if(!razon){msg.textContent='La razón social es obligatoria';return;}
  const fechaUltima=document.getElementById('altaFechaUltima').value||null;
  const periodicidad=document.getElementById('altaPeriodicidad').value;
  // Calcular fecha próxima renovación según periodicidad, si se dio fecha última
  let fechaProxima=null;
  if(fechaUltima){
    const d=new Date(fechaUltima+'T00:00:00');
    if(periodicidad==='mensual') d.setMonth(d.getMonth()+1);
    else if(periodicidad==='semestral') d.setMonth(d.getMonth()+6);
    else d.setFullYear(d.getFullYear()+1);
    fechaProxima=d.toISOString().split('T')[0];
  }
  const payload={
    razon_social:razon,
    rfc:document.getElementById('altaRfc').value.trim()||null,
    numserie:document.getElementById('altaNumserie').value.trim()||null,
    producto:document.getElementById('altaProducto').value.trim()||null,
    periodicidad,
    monto:parseFloat(document.getElementById('altaMonto').value)||null,
    fecha_ultima_renovacion:fechaUltima,
    fecha_proxima_renovacion:fechaProxima,
    vendedor_asignado:currentUser.id,
    estado:'reclamada',
    origen:'alta_vendedor',
  };
  // Insertar primero el cliente, luego la suscripción
  const {data:nuevoCliente,error:errCliente}=await sb.from('clientes_cartera').insert({
    razon_social:razon,
    rfc:payload.rfc,
    vendedor_asignado:currentUser.id,
    origen:'alta_vendedor',
    num_cliente:'ALT-'+Date.now()
  }).select().single();
  if(errCliente){msg.textContent='Error al crear cliente: '+errCliente.message;return;}
  const {error}=await sb.from('suscripciones_cartera').insert({
    cliente_id:nuevoCliente.id,
    numserie:payload.numserie,
    producto:payload.producto,
    periodicidad:payload.periodicidad,
    monto:payload.monto,
    fecha_ultima_renovacion:payload.fecha_ultima_renovacion,
    fecha_proxima_renovacion:payload.fecha_proxima_renovacion,
    estado:'reclamada',
    origen:'alta_vendedor'
  });
  if(error){msg.textContent='Error: '+error.message;return;}
  document.getElementById('modalAltaCuenta').remove();
  renderCarteraVendedor();
}

function renderDirCarteraContenido(){
  const cont=document.getElementById('dirCarteraContenido');
  if(!cont) return;
  const clientes=window._cartClientes||[];
  const q=carteraFiltroTexto.toLowerCase();
  const prod=carteraFiltroProducto;
  const vend=dirCarteraVendedorFiltro;

  let filtrados=clientes.filter(cl=>{
    const matchQ=!q||(cl.razon_social||'').toLowerCase().includes(q)||(cl.rfc||'').toLowerCase().includes(q)||(cl.num_cliente||'').toLowerCase().includes(q);
    const matchProd=!prod||(cl._suscripciones||[]).some(s=>s.producto===prod);
    const matchVend=!vend||(vend==='__sin_asignar__'?!cl.vendedor_asignado:cl.vendedor_asignado===vend);
    return matchQ&&matchProd&&matchVend;
  });

  // Agrupar con subcuentas
  const principales=filtrados.filter(c=>!c.cliente_padre_id);
  const subcuentas=filtrados.filter(c=>!!c.cliente_padre_id);
  const agrupados=[];
  for(const p of principales){
    agrupados.push(p);
    subcuentas.filter(s=>s.cliente_padre_id===p.id).forEach(s=>agrupados.push(s));
  }
  const enAgrupados=new Set(agrupados.map(c=>c.id));
  subcuentas.filter(s=>!enAgrupados.has(s.id)).forEach(s=>agrupados.push(s));

  if(!agrupados.length){
    cont.innerHTML=`<div style="text-align:center;padding:50px;color:var(--text3);">${q||prod||vend?'Ningún cliente coincide con los filtros.':'No hay clientes en la cartera.'}</div>`;
    return;
  }
  cont.innerHTML=`<div style="display:grid;gap:8px;">${agrupados.map(cl=>fichaClienteCartera(cl,'todos')).join('')}</div>`;
}

      <div style="font-size:12px;color:var(--text3);">Asigna a Joshua una lista de cuentas activas para contactar — separado de los prospectos de masterclass.</div>
    </div>
    <button onclick="abrirNuevaCampanaCartera()" style="background:var(--teal);color:#fff;border:none;border-radius:var(--radsm);padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;">+ Nueva campaña</button>
  </div>
  ${camp.length===0?`<div style="text-align:center;padding:50px;color:var(--text3);">No hay campañas de cartera creadas aún. Crea una para asignarle cuentas a Joshua.</div>`
  :`<div style="display:grid;gap:12px;">${camp.map(c=>{
    const asignado=teleUsers.find(u=>u.id===c.asignado_a);
    const activa=c.activa;
    const total=c.total_cuentas||0;

    // Calcular proyección solo para campañas activas con datos
    let proyHtml='';
    if(activa && total>0){
      const llamadas=llamadasPorCampana[c.id]||[];
      const contactadas=llamadas.length;
      const pct=Math.round(contactadas/total*100);
      // Calcular promedio diario: agrupar por fecha
      const porDia={};
      llamadas.forEach(ts=>{
        const d=ts.slice(0,10);
        porDia[d]=(porDia[d]||0)+1;
      });
      const dias=Object.keys(porDia).length;
      const promDia=dias>0?contactadas/dias:0;
      const restantes=total-contactadas;

      let proyTexto='';
      if(contactadas>=total){
        proyTexto='<span style="color:#27AE60;font-weight:600;">✓ Campaña completada</span>';
      } else if(promDia>0){
        const diasRestantes=Math.ceil(restantes/promDia);
        const fechaEst=new Date();
        fechaEst.setDate(fechaEst.getDate()+diasRestantes);
        const meses=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
        const fechaStr=fechaEst.getDate()+' '+meses[fechaEst.getMonth()];
        proyTexto=`<span style="color:var(--teal);">📅 A este ritmo (${promDia<1?'<1':Math.round(promDia*10)/10} llamadas/día) termina en ~${diasRestantes} día${diasRestantes===1?'':'s'} · est. ${fechaStr}</span>`;
      } else {
        proyTexto='<span style="color:var(--text3);">Sin actividad registrada aún</span>';
      }

      proyHtml=`
      <div style="margin-top:8px;border-top:1px solid var(--border);padding-top:8px;">
        <div style="height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:6px;">
          <div style="height:100%;width:${pct}%;background:var(--teal);border-radius:2px;transition:width .3s;"></div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;font-size:11px;">
          <span style="color:var(--text3);">${contactadas}/${total} contactados (${pct}%)</span>
          ${proyTexto}
        </div>
      </div>`;
    }

    return `<div class="card" style="padding:16px;border-left:4px solid ${activa?'var(--teal)':'var(--border)'};">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;">
        <div style="flex:1;">
          <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px;">${c.nombre}</div>
          <div style="font-size:11px;color:var(--text3);">${c.descripcion||''}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:4px;">
            ${asignado?`Asignada a: <strong>${asignado.nombre}</strong> · `:''}
            ${total} cuentas · 
            <span style="color:${activa?'#27AE60':'var(--text3)'};">${activa?'● Activa':'Inactiva'}</span>
          </div>
          ${proyHtml}
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0;">
          <button onclick="gestionarCampanaCartera('${c.id}')" style="background:var(--navy);color:#fff;border:none;border-radius:5px;padding:5px 12px;font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;">Gestionar</button>
          ${activa
            ?`<button onclick="toggleCampanaCartera('${c.id}',false)" style="background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-b);border-radius:5px;padding:5px 12px;font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;">Desactivar</button>`
            :`<button onclick="toggleCampanaCartera('${c.id}',true)" style="background:rgba(39,174,96,0.1);color:#27AE60;border:1px solid rgba(39,174,96,0.3);border-radius:5px;padding:5px 12px;font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;">Activar</button>`}
        </div>
      </div>
    </div>`;
  }).join('')}</div>`}`;
}

async function guardarNuevaCampanaCartera(){
  const nombre=document.getElementById('ncNombre')?.value.trim();
  const msg=document.getElementById('ncMsg');
  if(!nombre){msg.textContent='El nombre es obligatorio';return;}
  const asignado=document.getElementById('ncAsignado')?.value||null;
  if(!asignado){msg.textContent='Selecciona a quién asignar la campaña';return;}
  const payload={
    nombre,descripcion:document.getElementById('ncDesc')?.value.trim()||null,
    asignado_a:asignado,activa:false,total_cuentas:0,
    fecha_inicio:document.getElementById('ncInicio')?.value||null,
    fecha_fin:document.getElementById('ncFin')?.value||null,
    created_at:new Date().toISOString()
  };
  const {data:nuevaCamp,error}=await sb.from('campanas_cartera').insert(payload).select().single();
  if(error){msg.textContent='Error: '+error.message;return;}
  document.getElementById('modalNuevaCampCartera').remove();
  // Abrir directamente gestionar para que seleccione los clientes
  gestionarCampanaCartera(nuevaCamp.id);
}

function filtrarListaCampCartera(){
  const prod=document.getElementById('campCartFiltProd')?.value||'';
  const q=(document.getElementById('campCartBuscar')?.value||'').toLowerCase();
  document.querySelectorAll('#listaCampCartera .camp-cart-fila').forEach(fila=>{
    const matchProd=!prod||fila.dataset.prod?.includes(prod);
    const matchQ=!q||fila.dataset.razon?.includes(q);
    fila.style.display=(matchProd&&matchQ)?'flex':'none';
  });
}

function seleccionarTodosCampCartera(marcar){
  document.querySelectorAll('#listaCampCartera .camp-cart-fila').forEach(fila=>{
    if(fila.style.display!=='none'){
      const cb=fila.querySelector('input[type="checkbox"]');
      if(cb) cb.checked=marcar;
    }
  });
}

async function guardarSeleccionCampCartera(campanaId){
  const checks=document.querySelectorAll('#listaCampCartera input[type="checkbox"]');
  const seleccionadas=[...checks].filter(c=>c.checked).map(c=>c.dataset.id);
  const {error:delErr}=await sb.from('campana_cartera_clientes').delete().eq('campana_id',campanaId);
  if(delErr){alert('Error: '+delErr.message);return;}
  if(seleccionadas.length){
    const filas=seleccionadas.map(id=>({campana_id:campanaId,cliente_id:id}));
    const {error}=await sb.from('campana_cartera_clientes').insert(filas);
    if(error){alert('Error al guardar: '+error.message);return;}
  }
  await sb.from('campanas_cartera').update({total_cuentas:seleccionadas.length,updated_at:new Date().toISOString()}).eq('id',campanaId);
  const msgEl=document.createElement('div');
  msgEl.textContent=`✓ ${seleccionadas.length} clientes guardados en la campaña`;
  msgEl.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#27AE60;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:9999;';
  document.body.appendChild(msgEl);
  setTimeout(()=>msgEl.remove(),3000);
}

let histSortCol='fecha', histSortDir=-1, histFiltroMes='';
async function renderHistorico(){
  document.getElementById('mainContent').innerHTML='<div class="loading"><div class="spinner"></div> Cargando histórico...</div>';
  const {data:regs}=await sb.from('registros_diarios').select('*').eq('usuario_id',currentUser.id).order('fecha',{ascending:false});
  window._historicoRows=regs||[];
  renderHistoricoTabla();
}

function renderHistoricoTabla(){
  const mc=document.getElementById('mainContent');
  if(!mc) return;
  let rows=window._historicoRows||[];
  // Filtro por mes
  if(histFiltroMes) rows=rows.filter(r=>r.fecha&&r.fecha.slice(0,7)===histFiltroMes);
  // Ordenamiento
  const dir=histSortDir;
  rows=[...rows].sort((a,b)=>{
    let va=a[histSortCol]||'', vb=b[histSortCol]||'';
    if(typeof va==='string') va=va.toLowerCase();
    if(typeof vb==='string') vb=vb.toLowerCase();
    return va<vb?-dir:va>vb?dir:0;
  });
  const flecha=(col)=>histSortCol===col?(histSortDir===1?' ▲':' ▼'):'';
  const th=(label,col)=>`<th onclick="histSort('${col}')" style="cursor:pointer;user-select:none;" title="Ordenar por ${label}">${label}${flecha(col)}</th>`;
  // Meses únicos para el filtro
  const mesesUnicos=[...new Set((window._historicoRows||[]).map(r=>r.fecha?r.fecha.slice(0,7):null).filter(Boolean))].sort().reverse();
  mc.innerHTML=`
  <div class="card">
    <div class="card-head" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
      <div><span class="card-title">Todos los registros</span><span class="badge bt" style="margin-left:8px;">${rows.length} días</span></div>
      <select onchange="histFiltroMes=this.value;renderHistoricoTabla()" style="padding:6px 10px;border:1px solid var(--border);border-radius:var(--radsm);font-size:12px;font-family:'Inter',sans-serif;">
        <option value="">Todos los meses</option>
        ${mesesUnicos.map(m=>`<option value="${m}" ${histFiltroMes===m?'selected':''}>${m}</option>`).join('')}
      </select>
    </div>
    <div style="font-size:11px;color:var(--text3);padding:8px 16px 0;">Clic en encabezado para ordenar · Clic en fila para ver detalle completo.</div>
    <table class="daily">
      <thead><tr>
        <th></th>
        ${th('Fecha','fecha')}${th('Servicios','svc')}${th('Aspel','aspel')}${th('IT','it')}
        ${th('Cotiz.','cotizaciones')}${th('Cursos','cursos')}${th('Demos','demos')}${th('Clientes','clientes_nuevos')}${th('Val.','valoraciones')}
      </tr></thead>

}

    ${campo('Valoraciones',r.valoraciones,false)}

    ${campo('Siigo Fiscal (cierres)',r.siigo_fiscal,false)}
    ${campo('Suscripciones',r.suscripciones,false)}
    ${campo('Renovaciones Aspel',r.renovaciones,false)}
    ${campo('Prospectos canalizados',r.prospectos_canalizados,false)}

    <div style="grid-column:1/-1;font-size:10px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:0.06em;margin:6px 0 -6px;">Cursos en vivo</div>

    <div style="grid-column:1/-1;font-size:10px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:0.06em;margin:6px 0 -6px;">Llamadas (informativo)</div>

function toggleHistDetalle(idx){
  const det=document.getElementById('histDetalle_'+idx);
  const arrow=document.getElementById('histArrow_'+idx);
  if(!det) return;
  const abierto=det.style.display!=='none';
  det.style.display=abierto?'none':'table-row';
  if(arrow) arrow.textContent=abierto?'▸':'▾';
}

let currentDirTab='resumen';
function swD(id){

  currentDirTab=id;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['resumen','vendedores','anual','kpis','liberaciones','crm','campanas','cartera','proyecciondir','promociones','finanzas','config'][i]===id));
  if(id==='resumen')renderDirectorResumen();
  else if(id==='vendedores')renderDirectorVendedores();
  else if(id==='anual')renderDirectorAnual();
  else if(id==='kpis')renderDirectorKpis();
  else if(id==='liberaciones')renderDirectorLiberaciones();
  else if(id==='crm')renderDirectorCRM();
  else if(id==='campanas')renderDirectorCampanas();
  else if(id==='cartera')renderDirectorCartera();
  else if(id==='proyecciondir')renderDirectorProyeccion();
  else if(id==='promociones')renderDirectorPromociones();
  else if(id==='finanzas')renderFinanzas();

  if(currentDirTab==='resumen')renderDirectorResumen();
  else if(currentDirTab==='vendedores')renderDirectorVendedores();
  else if(currentDirTab==='anual')renderDirectorAnual();
  else if(currentDirTab==='kpis')renderDirectorKpis();
  else if(currentDirTab==='liberaciones')renderDirectorLiberaciones();
  else if(currentDirTab==='crm')renderDirectorCRM();
  else if(currentDirTab==='campanas')renderDirectorCampanas();
  else if(currentDirTab==='cartera')renderDirectorCartera();
  else if(currentDirTab==='proyecciondir')renderDirectorProyeccion();
  else if(currentDirTab==='promociones')renderDirectorPromociones();
  else if(currentDirTab==='finanzas')renderFinanzas();
